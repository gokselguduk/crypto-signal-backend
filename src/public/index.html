<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kripto Sinyal">
<title>Kripto Sinyal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0A0E17; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
  
  .ustbar { position: sticky; top: 0; background: #0A0E17; padding: 12px 16px 8px; z-index: 100; border-bottom: 1px solid #21262D; }
  .ustbar-icerik { display: flex; justify-content: space-between; align-items: center; }
  .baslik { font-size: 20px; font-weight: 700; }
  .guncelleme { font-size: 11px; color: #8B949E; margin-top: 2px; }
  .bildirim-btn { background: #161B22; border: 1px solid #30363D; border-radius: 20px; padding: 6px 12px; color: #8B949E; font-size: 13px; cursor: pointer; }
  .bildirim-btn.aktif { border-color: #58A6FF; color: #58A6FF; }

  .filtre-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; }
  .filtre-bar::-webkit-scrollbar { display: none; }
  .filtre-btn { white-space: nowrap; padding: 7px 16px; border-radius: 20px; border: 1px solid #30363D; background: #161B22; color: #8B949E; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .filtre-btn.aktif { background: #58A6FF; border-color: #58A6FF; color: #fff; font-weight: 600; }

  .kart { margin: 8px 16px; background: #161B22; border-radius: 16px; border: 1px solid #21262D; border-left: 4px solid #3FB950; overflow: hidden; cursor: pointer; transition: opacity 0.2s; }
  .kart:active { opacity: 0.8; }
  .firsat-kart { border: 2px solid #FFD700; }
  .firsat-bant { background: #2a2000; padding: 6px; text-align: center; font-size: 11px; font-weight: 700; color: #FFD700; }
  .kart-ust { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px 6px; }
  .coin-adi { font-size: 20px; font-weight: 700; }
  .rozet-grup { display: flex; gap: 6px; align-items: center; }
  .mtf-rozet { background: #1a2a1a; border: 1px solid #3FB950; border-radius: 5px; padding: 2px 6px; font-size: 10px; color: #3FB950; font-weight: 700; }
  .rozet { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; color: #fff; }
  .fiyat { font-size: 18px; font-weight: 700; color: #C9D1D9; padding: 4px 14px 10px; }
  .ozet-satir { display: flex; justify-content: space-between; padding: 0 14px 10px; }
  .ozet-txt { font-size: 12px; color: #8B949E; }
  .dokun-txt { text-align: right; padding: 0 14px 10px; font-size: 11px; color: #30363D; }

  .modal-arka { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; justify-content: flex-end; align-items: flex-end; }
  .modal-arka.acik { display: flex; }
  .modal-kutu { background: #0D1117; border-radius: 24px 24px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; padding-bottom: 30px; }
  .modal-ust { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 20px 12px; }
  .modal-coin { font-size: 24px; font-weight: 700; }
  .modal-fiyat { font-size: 15px; color: #8B949E; margin-top: 4px; }
  .modal-rozet { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; color: #fff; }
  .modal-ayrac { height: 1px; background: #21262D; margin: 14px 20px; }
  .bolum-baslik { font-size: 13px; font-weight: 700; color: #C9D1D9; padding: 0 20px 10px; }

  .basari-satir { display: flex; gap: 8px; padding: 0 20px 12px; }
  .basari-kutu { flex: 1; background: #161B22; border-radius: 10px; padding: 10px; text-align: center; }
  .basari-etiket { font-size: 10px; color: #8B949E; margin-bottom: 4px; }
  .basari-deger { font-size: 18px; font-weight: 700; }
  .basari-bar-bg { margin: 0 20px 16px; height: 8px; background: #21262D; border-radius: 4px; overflow: hidden; }
  .basari-bar-dolu { height: 8px; border-radius: 4px; transition: width 0.5s; }

  .seviye-grid { display: flex; flex-wrap: wrap; padding: 0 16px 4px; gap: 8px; }
  .seviye-kart { width: calc(33.33% - 6px); background: #161B22; border-radius: 10px; padding: 10px; border-left: 3px solid #3FB950; }
  .seviye-etiket { font-size: 9px; color: #8B949E; font-weight: 700; margin-bottom: 4px; }
  .seviye-deger { font-size: 12px; font-weight: 700; }
  .seviye-alt { font-size: 9px; color: #8B949E; margin-top: 2px; }

  .gosterge-grid { display: flex; flex-wrap: wrap; padding: 0 16px 4px; gap: 8px; }
  .gosterge-kutu { width: calc(33.33% - 6px); background: #161B22; border-radius: 10px; padding: 10px; text-align: center; }
  .gosterge-etiket { font-size: 9px; color: #8B949E; margin-bottom: 4px; }
  .gosterge-deger { font-size: 16px; font-weight: 700; }
  .gosterge-alt { font-size: 9px; color: #8B949E; margin-top: 2px; }

  .yorum-satir { display: flex; gap: 8px; padding: 0 20px 8px; }
  .yorum-nokta { color: #58A6FF; font-size: 12px; margin-top: 2px; flex-shrink: 0; }
  .yorum-txt { color: #C9D1D9; font-size: 13px; line-height: 1.5; }

  .neden-satir { display: flex; gap: 8px; padding: 0 20px 6px; }
  .neden-ikon { color: #3FB950; font-size: 12px; flex-shrink: 0; }
  .neden-txt { color: #8B949E; font-size: 13px; }

  .kapat-btn { margin: 16px 20px 0; background: #161B22; border: 1px solid #30363D; border-radius: 12px; padding: 16px; text-align: center; color: #8B949E; font-size: 15px; font-weight: 700; cursor: pointer; }

  .yukleme { text-align: center; padding: 60px 20px; color: #8B949E; }
  .spinner { width: 40px; height: 40px; border: 3px solid #21262D; border-top-color: #58A6FF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .rapor-kapsam { padding: 16px; }
  .rapor-baslik { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .rapor-zaman { font-size: 11px; color: #8B949E; margin-bottom: 16px; }
  .rapor-grid { display: flex; gap: 8px; margin-bottom: 20px; }
  .rapor-kutu { flex: 1; background: #161B22; border-radius: 12px; padding: 12px; text-align: center; }
  .rapor-sayi { font-size: 22px; font-weight: 700; }
  .rapor-etiket { font-size: 10px; color: #8B949E; margin-top: 4px; }
  .rapor-alt-baslik { font-size: 14px; font-weight: 700; color: #C9D1D9; margin-bottom: 10px; }
  .rapor-satir { display: flex; justify-content: space-between; align-items: center; background: #161B22; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid #21262D; cursor: pointer; }
  .rapor-coin { font-size: 16px; font-weight: 700; }
  .rapor-alt { font-size: 11px; color: #8B949E; margin-top: 2px; }
  .rapor-sag { text-align: right; }
  .rapor-yuzde { font-size: 13px; font-weight: 700; }
  .rapor-sure { font-size: 11px; color: #58A6FF; margin-top: 2px; }
  .rapor-hedef { font-size: 11px; color: #FFD700; margin-top: 2px; }

  .bos { text-align: center; padding: 60px 20px; color: #8B949E; font-size: 14px; }
</style>
</head>
<body>

<div class="ustbar">
  <div class="ustbar-icerik">
    <div>
      <div class="baslik">Kripto Sinyaller</div>
      <div class="guncelleme" id="guncelleme">Yükleniyor...</div>
    </div>
    <button class="bildirim-btn aktif" id="bildirim-btn" onclick="bildirimToggle()">🔔 Açık</button>
  </div>
</div>

<div class="filtre-bar">
  <button class="filtre-btn aktif" onclick="filtreSec('tumu', this)">Tümü</button>
  <button class="filtre-btn" onclick="filtreSec('guclu', this)">Güçlü Al</button>
  <button class="filtre-btn" onclick="filtreSec('firsat', this)">Fırsat</button>
  <button class="filtre-btn" onclick="filtreSec('rapor', this)">Rapor</button>
</div>

<div id="icerik">
  <div class="yukleme">
    <div class="spinner"></div>
    <div>Piyasa taranıyor...</div>
  </div>
</div>

<div class="modal-arka" id="modal" onclick="modalKapat(event)">
  <div class="modal-kutu" id="modal-icerik"></div>
</div>

<script>
const BASE_URL = 'https://invigorating-gentleness-production.up.railway.app';
let sinyaller = [];
let aktifFiltre = 'tumu';
let bildirimAcik = true;
let zamanlayici;

async function sinyalCek() {
  try {
    const res = await fetch(BASE_URL + '/api/scan/latest');
    const data = await res.json();
    sinyaller = (data.signals || []).filter(s => s.score > 0);
    document.getElementById('guncelleme').textContent =
      new Date().toLocaleTimeString('tr-TR') + ' · ' + sinyaller.length + ' AL sinyali';
    render();
  } catch(e) {
    document.getElementById('guncelleme').textContent = 'Bağlantı hatası';
  }
}

function basariYuzdesi(s) {
  let b = 50 + (s.score || 0) * 8;
  if (s.rsi < 35) b += 10;
  if (s.rsi < 25) b += 10;
  if (s.isHighPotential) b += 5;
  if (s.mtfKonfirm) b += 8;
  if (s.volume && s.volume.isHigh) b += 5;
  if (s.fibonacci && s.fibonacci.atSupport) b += 7;
  return Math.min(Math.max(Math.round(b), 30), 93);
}

function tahminiSure(s) {
  const tp1 = s.atr && s.atr.tp1Pct ? s.atr.tp1Pct : 2;
  if (tp1 >= 5) return '2-4 saat';
  if (tp1 >= 3) return '4-8 saat';
  if (tp1 >= 2) return '8-24 saat';
  return '1-3 gün';
}

function renk(skor) {
  if (skor >= 6) return '#00FF88';
  if (skor >= 4) return '#3FB950';
  return '#2ea84c';
}

function etiket(skor) {
  if (skor >= 6) return 'ÇOK GÜÇLÜ AL';
  if (skor >= 4) return 'GÜÇLÜ AL';
  if (skor >= 2) return 'AL';
  return 'ZAYIF AL';
}

function fmt(sayi) {
  if (!sayi) return '-';
  return Number(sayi).toLocaleString('tr-TR', { maximumFractionDigits: 6 });
}

function yorumlar(s) {
  const y = [];
  if (s.rsi < 30) y.push('RSI aşırı satım bölgesinde, dip olabilir.');
  if (s.trend && s.trend.goldenCross) y.push('Golden Cross oluştu, güçlü AL sinyali.');
  if (s.mtfKonfirm) y.push('4 saatlik grafik de AL diyor, güçlü konfirmasyon.');
  if (s.volume && s.volume.isHigh) y.push('Hacim ortalamanın ' + s.volume.ratio + 'x üzerinde.');
  if (s.fibonacci && s.fibonacci.atSupport) y.push('Fibonacci destek seviyesinde, geri dönüş bekleniyor.');
  if (s.isHighPotential) y.push('Yüksek potansiyel, TP3\'e kadar %' + (s.atr && s.atr.tp3Pct) + ' hedef.');
  if (s.trend && s.trend.trend === 'STRONG_UP') y.push('Güçlü yükseliş trendi mevcut.');
  if (y.length === 0) y.push('Teknik göstergeler alım yönünde işaret ediyor.');
  return y;
}

function kartHTML(s) {
  const r = renk(s.score);
  const b = basariYuzdesi(s);
  const sure = tahminiSure(s);
  const sembol = s.symbol ? s.symbol.replace('USDT', '') : '';
  return `
    <div class="kart ${s.isHighPotential ? 'firsat-kart' : ''}"
         style="border-left-color:${r}"
         onclick="modalAc(${s._idx})">
      ${s.isHighPotential ? `<div class="firsat-bant">🔥 FIRSAT · Max +%${s.atr && s.atr.tp3Pct} · Detay için dokun</div>` : ''}
      <div class="kart-ust">
        <div class="coin-adi">${sembol}</div>
        <div class="rozet-grup">
          ${s.mtfKonfirm ? '<span class="mtf-rozet">MTF</span>' : ''}
          <span class="rozet" style="background:${r}">${etiket(s.score)}</span>
        </div>
      </div>
      <div class="fiyat">$${fmt(s.lastClose)}</div>
      <div class="ozet-satir">
        <span class="ozet-txt">RSI: ${s.rsi}</span>
        <span class="ozet-txt">Skor: +${s.score}</span>
        <span class="ozet-txt">Başarı: %${b}</span>
        <span class="ozet-txt" style="color:#58A6FF">${sure}</span>
      </div>
      <div class="dokun-txt">Detay için dokun →</div>
    </div>`;
}

function modalHTML(s) {
  const r = renk(s.score);
  const b = basariYuzdesi(s);
  const sure = tahminiSure(s);
  const yors = yorumlar(s);
  const sembol = s.symbol ? s.symbol.replace('USDT', '/USDT') : '';
  const buyAl = s.signals ? s.signals.filter(sg => sg.type === 'BUY') : [];

  return `
    <div class="modal-ust">
      <div>
        <div class="modal-coin">${sembol}</div>
        <div class="modal-fiyat">$${fmt(s.lastClose)}</div>
      </div>
      <div class="modal-rozet" style="background:${r}">${etiket(s.score)}</div>
    </div>
    ${s.isHighPotential ? `<div class="firsat-bant" style="margin:0 20px;border-radius:8px">🔥 YÜKSEK POTANSİYEL · Max +%${s.atr && s.atr.tp3Pct}</div>` : ''}
    <div class="modal-ayrac"></div>

    <div class="bolum-baslik">Başarı Analizi</div>
    <div class="basari-satir">
      <div class="basari-kutu">
        <div class="basari-etiket">Başarı Tahmini</div>
        <div class="basari-deger" style="color:${r}">%${b}</div>
      </div>
      <div class="basari-kutu">
        <div class="basari-etiket">Tahmini Süre</div>
        <div class="basari-deger" style="color:#58A6FF">${sure}</div>
      </div>
      <div class="basari-kutu">
        <div class="basari-etiket">Risk/Getiri</div>
        <div class="basari-deger" style="color:#FFD700">${s.atr && s.atr.riskReward || '-'}x</div>
      </div>
    </div>
    <div class="basari-bar-bg">
      <div class="basari-bar-dolu" style="width:${b}%;background:${r}"></div>
    </div>
    <div class="modal-ayrac"></div>

    <div class="bolum-baslik">Alış / Satış Noktaları</div>
    <div class="seviye-grid">
      <div class="seviye-kart" style="border-left-color:#fff">
        <div class="seviye-etiket">GİRİŞ</div>
        <div class="seviye-deger" style="color:#fff">$${fmt(s.lastClose)}</div>
        <div class="seviye-alt">Şu anki fiyat</div>
      </div>
      <div class="seviye-kart" style="border-left-color:#F85149">
        <div class="seviye-etiket">STOP LOSS</div>
        <div class="seviye-deger" style="color:#F85149">$${fmt(s.atr && s.atr.stopLoss)}</div>
        <div class="seviye-alt">-%${s.atr && s.atr.stopLossPct} kayıp</div>
      </div>
      <div class="seviye-kart" style="border-left-color:#3FB950">
        <div class="seviye-etiket">HEDEF 1</div>
        <div class="seviye-deger" style="color:#3FB950">$${fmt(s.atr && s.atr.takeProfit1)}</div>
        <div class="seviye-alt">+%${s.atr && s.atr.tp1Pct}</div>
      </div>
      <div class="seviye-kart" style="border-left-color:#3FB950">
        <div class="seviye-etiket">HEDEF 2</div>
        <div class="seviye-deger" style="color:#3FB950">$${fmt(s.atr && s.atr.takeProfit2)}</div>
        <div class="seviye-alt">+%${s.atr && s.atr.tp2Pct}</div>
      </div>
      <div class="seviye-kart" style="border-left-color:#00FF88">
        <div class="seviye-etiket">HEDEF 3</div>
        <div class="seviye-deger" style="color:#00FF88">$${fmt(s.atr && s.atr.takeProfit3)}</div>
        <div class="seviye-alt">+%${s.atr && s.atr.tp3Pct}</div>
      </div>
      <div class="seviye-kart" style="border-left-color:#58A6FF">
        <div class="seviye-etiket">FİBONACCİ</div>
        <div class="seviye-deger" style="color:#58A6FF;font-size:11px">$${fmt(s.fibonacci && s.fibonacci.nearestSupport)}</div>
        <div class="seviye-alt">Destek</div>
      </div>
    </div>
    <div class="modal-ayrac"></div>

    <div class="bolum-baslik">Teknik Göstergeler</div>
    <div class="gosterge-grid">
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">RSI</div>
        <div class="gosterge-deger" style="color:${s.rsi < 35 ? '#00FF88' : s.rsi > 70 ? '#F85149' : '#C9D1D9'}">${s.rsi}</div>
        <div class="gosterge-alt">${s.rsi < 35 ? 'Aşırı satım' : s.rsi > 70 ? 'Aşırı alım' : 'Normal'}</div>
      </div>
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">SKOR 1S</div>
        <div class="gosterge-deger" style="color:${r}">+${s.score}</div>
        <div class="gosterge-alt">1 saatlik</div>
      </div>
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">SKOR 4S</div>
        <div class="gosterge-deger" style="color:${(s.score4h||0)>0?'#3FB950':'#F85149'}">${(s.score4h||0)>0?'+':''}${s.score4h||0}</div>
        <div class="gosterge-alt">4 saatlik</div>
      </div>
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">HACİM</div>
        <div class="gosterge-deger" style="color:${s.volume&&s.volume.isHigh?'#00FF88':'#C9D1D9'}">${s.volume?s.volume.ratio+'x':'-'}</div>
        <div class="gosterge-alt">${s.volume&&s.volume.isHigh?'Yüksek':'Normal'}</div>
      </div>
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">MTF</div>
        <div class="gosterge-deger" style="color:${s.mtfKonfirm?'#00FF88':'#F85149'}">${s.mtfKonfirm?'ONAY':'YOK'}</div>
        <div class="gosterge-alt">Çoklu zaman</div>
      </div>
      <div class="gosterge-kutu">
        <div class="gosterge-etiket">FİB DESTEK</div>
        <div class="gosterge-deger" style="color:${s.fibonacci&&s.fibonacci.atSupport?'#00FF88':'#C9D1D9'}">${s.fibonacci&&s.fibonacci.atSupport?'EVET':'HAYIR'}</div>
        <div class="gosterge-alt">Fibonacci</div>
      </div>
    </div>
    <div class="modal-ayrac"></div>

    <div class="bolum-baslik">Piyasa Yorumu</div>
    ${yors.map(y => `<div class="yorum-satir"><span class="yorum-nokta">▸</span><span class="yorum-txt">${y}</span></div>`).join('')}
    <div class="modal-ayrac"></div>

    <div class="bolum-baslik">Sinyal Nedenleri</div>
    ${buyAl.map(sg => `<div class="neden-satir"><span class="neden-ikon">▲</span><span class="neden-txt">${sg.reason}</span></div>`).join('')}

    <div class="kapat-btn" onclick="document.getElementById('modal').classList.remove('acik')">Kapat</div>
  `;
}

function raporHTML() {
  const guclu = sinyaller.filter(s => s.score >= 4).length;
  const firsat = sinyaller.filter(s => s.isHighPotential).length;
  const mtf = sinyaller.filter(s => s.mtfKonfirm).length;
  const ortB = sinyaller.length > 0
    ? Math.round(sinyaller.reduce((t,s) => t + basariYuzdesi(s), 0) / sinyaller.length) : 0;
  const enIyi = sinyaller.filter(s => s.mtfKonfirm || s.isHighPotential).slice(0, 8);

  return `<div class="rapor-kapsam">
    <div class="rapor-baslik">Piyasa Raporu</div>
    <div class="rapor-zaman">${document.getElementById('guncelleme').textContent}</div>
    <div class="rapor-grid">
      <div class="rapor-kutu"><div class="rapor-sayi">${sinyaller.length}</div><div class="rapor-etiket">Toplam AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#00FF88">${guclu}</div><div class="rapor-etiket">Güçlü AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#FFD700">${firsat}</div><div class="rapor-etiket">Fırsat</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#58A6FF">${ortB}%</div><div class="rapor-etiket">Ort. Başarı</div></div>
    </div>
    <div class="rapor-alt-baslik">MTF Onaylı Fırsatlar (${mtf})</div>
    ${enIyi.length === 0 ? '<div class="bos">Şu an güçlü fırsat yok</div>' :
      enIyi.map(s => `
        <div class="rapor-satir" onclick="modalAc(${s._idx})">
          <div>
            <div class="rapor-coin">${s.symbol.replace('USDT','')}</div>
            <div class="rapor-alt">${s.mtfKonfirm ? '✓ MTF Onaylı' : '🔥 Fırsat'}</div>
          </div>
          <div class="rapor-sag">
            <div class="rapor-yuzde" style="color:${renk(s.score)}">%${basariYuzdesi(s)} başarı</div>
            <div class="rapor-sure">${tahminiSure(s)}</div>
            ${s.atr && s.atr.tp3Pct > 0 ? `<div class="rapor-hedef">Max +%${s.atr.tp3Pct}</div>` : ''}
          </div>
        </div>`).join('')}
  </div>`;
}

function render() {
  let liste = sinyaller;
  if (aktifFiltre === 'guclu') liste = sinyaller.filter(s => s.score >= 4);
  if (aktifFiltre === 'firsat') liste = sinyaller.filter(s => s.isHighPotential);

  liste.forEach((s, i) => s._idx = i);
  sinyaller.forEach((s, i) => s._idx = i);

  const el = document.getElementById('icerik');

  if (aktifFiltre === 'rapor') { el.innerHTML = raporHTML(); return; }
  if (liste.length === 0) { el.innerHTML = '<div class="bos">Bu filtre için sinyal yok</div>'; return; }

  el.innerHTML = liste.map(kartHTML).join('') + '<div style="height:40px"></div>';
}

function filtreSec(f, btn) {
  aktifFiltre = f;
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
  btn.classList.add('aktif');
  render();
}

function modalAc(idx) {
  const s = sinyaller[idx];
  if (!s) return;
  document.getElementById('modal-icerik').innerHTML = modalHTML(s);
  document.getElementById('modal').classList.add('acik');
  document.getElementById('modal-icerik').scrollTop = 0;
}

function modalKapat(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('acik');
  }
}

function bildirimToggle() {
  bildirimAcik = !bildirimAcik;
  const btn = document.getElementById('bildirim-btn');
  btn.textContent = bildirimAcik ? '🔔 Açık' : '🔕 Kapalı';
  btn.className = 'bildirim-btn' + (bildirimAcik ? ' aktif' : '');
}

sinyalCek();
zamanlayici = setInterval(sinyalCek, 60000);
</script>
</body>
