<body>

<div class="sticky-top">
  <div class="piyasa-durum" id="piyasa-durum">
    <div class="app-adi" id="app-adi" style="color:#58A6FF">SUNDAY</div>
    <svg width="56" height="56" viewBox="0 0 64 64" id="sun-svg"></svg>
    <div class="piyasa-etiket" id="piyasa-etiket" style="color:#58A6FF">Analiz ediliyor...</div>
    <div class="piyasa-alt" id="piyasa-alt">Piyasa durumu hesaplanıyor</div>
  </div>
  <div class="ust-bilgi">
    <div class="guncelleme" id="guncelleme">Yükleniyor...</div>
    <div class="fg-badge" id="fg-badge">
      <span id="fg-emoji">😐</span>
      <span id="fg-val" style="color:#8B949E">--</span>
    </div>
  </div>
  <div class="filtre-bar">
    <button class="filtre-btn guvenli-f" onclick="filtreSec('guvenli',this)">🏆 En Güvenli</button>
    <button class="filtre-btn aktif"     onclick="filtreSec('tumu',this)">Tümü</button>
    <button class="filtre-btn firsat-f"  onclick="filtreSec('firsat',this)">🔥 Fırsat</button>
    <button class="filtre-btn mtf-f"     onclick="filtreSec('mtf',this)">✓ MTF</button>
    <button class="filtre-btn guclu-f"   onclick="filtreSec('guclu',this)">⚡ Skor 4+</button>
    <button class="filtre-btn whale-f"   onclick="filtreSec('whale',this)">🐋 Whale</button>
    <button class="filtre-btn meme-f"    onclick="filtreSec('meme',this)">🚀 Meme</button>
    <button class="filtre-btn rapor-f"   onclick="filtreSec('rapor',this)">📊 Rapor</button>
  </div>
</div>

<div id="icerik">
  <div class="yukleme"><div class="spinner"></div><div>Piyasa taranıyor...</div></div>
</div>

<div class="modal-arka" id="modal" onclick="modalKapat(event)">
  <div class="modal-kutu" id="modal-icerik"></div>
</div>

<script>
const BASE = 'https://invigorating-gentleness-production.up.railway.app';
let sinyaller = [], aktifFiltre = 'tumu', zamanlayici;
let anlikFiyatlar = {};

async function sinyalCek() {
  try {
    const res  = await fetch(BASE + '/api/scan/latest');
    const data = await res.json();
    sinyaller  = (data.signals || []).filter(s => s.score > 0);
    sinyaller.forEach((s,i) => s._idx = i);
    const zaman = new Date().toLocaleTimeString('tr-TR');
    document.getElementById('guncelleme').textContent = zaman + ' · ' + sinyaller.length + ' sinyal';
    const fg = sinyaller[0] && sinyaller[0].sentiment;
    if (fg) guncelleFG(fg);
    sunGuncelle(sinyaller, fg);
    anlikFiyatGuncelle();
    render();
  } catch(e) {
    document.getElementById('guncelleme').textContent = 'Bağlantı hatası';
  }
}

async function anlikFiyatGuncelle() {
  if (sinyaller.length === 0) return;
  try {
    const symbols = sinyaller.slice(0,20).map(s => s.symbol);
    for (const sym of symbols) {
      try {
        const r = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=' + sym);
        const d = await r.json();
        if (d.price) anlikFiyatlar[sym] = parseFloat(d.price);
      } catch(e) {}
    }
    render();
  } catch(e) {}
}

function guncelleFG(fg) {
  const emoji = fg.isExtremeFear?'😱':fg.isFear?'😨':fg.isExtremeGreed?'🤑':fg.isGreed?'😎':'😐';
  const renk  = fg.isExtremeFear||fg.isFear?'#F85149':fg.isExtremeGreed||fg.isGreed?'#3FB950':'#8B949E';
  document.getElementById('fg-emoji').textContent = emoji;
  document.getElementById('fg-val').textContent   = fg.value||'--';
  document.getElementById('fg-val').style.color   = renk;
  document.getElementById('fg-badge').style.borderColor = renk;
}

function sunGuncelle(sins, sentiment) {
  const svg = document.getElementById('sun-svg');
  if (!svg) return;
  const guclu  = sins.filter(s=>s.score>=4).length;
  const firsat = sins.filter(s=>s.isHighPotential).length;
  const toplam = sins.length;
  let mod = toplam===0?'notr':guclu>=20||firsat>=10?'boga_guclu':guclu>=8||firsat>=4?'boga':toplam>=5?'olumlu':'notr';
  if (sentiment&&sentiment.isExtremeFear) mod='korku';
  if (sentiment&&sentiment.isExtremeGreed&&guclu<5) mod='uyari';
  const M={
    boga_guclu:{c:'#FFD700',bg:'#1a1500',txt:'BOĞA SEZONU',alt:'Güçlü yükseliş — Fırsatlar bol!'},
    boga:      {c:'#FF9500',bg:'#1a1000',txt:'BOĞA PİYASASI',alt:'Alım sinyalleri güçlü'},
    olumlu:    {c:'#3FB950',bg:'#0d1a0d',txt:'OLUMLU SEYİR',alt:'Piyasa yükseliş eğiliminde'},
    notr:      {c:'#58A6FF',bg:'#0d1520',txt:'NÖTR PİYASA',alt:'Belirgin yön yok — Dikkatli ol'},
    korku:     {c:'#8B5CF6',bg:'#100d1a',txt:'KORKU SEVİYESİ',alt:'Aşırı korku — Alım fırsatı yakın'},
    uyari:     {c:'#F85149',bg:'#1a0d0d',txt:'AŞIRI AÇGÖZLÜLÜK',alt:'Dikkat — Düzeltme riski yüksek'}
  };
  const r=M[mod]||M.notr;
  let html=`<circle cx="32" cy="32" r="13" fill="${r.c}" opacity="0.95"/>`;
  [0,45,90,135,180,225,270,315].forEach(a=>{
    const rad=a*Math.PI/180;
    html+=`<line x1="${(32+Math.cos(rad)*18).toFixed(1)}" y1="${(32+Math.sin(rad)*18).toFixed(1)}" x2="${(32+Math.cos(rad)*27).toFixed(1)}" y2="${(32+Math.sin(rad)*27).toFixed(1)}" stroke="${r.c}" stroke-width="3" stroke-linecap="round" opacity="0.85"/>`;
  });
  [22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5].forEach(a=>{
    const rad=a*Math.PI/180;
    html+=`<line x1="${(32+Math.cos(rad)*17).toFixed(1)}" y1="${(32+Math.sin(rad)*17).toFixed(1)}" x2="${(32+Math.cos(rad)*22).toFixed(1)}" y2="${(32+Math.sin(rad)*22).toFixed(1)}" stroke="${r.c}" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>`;
  });
  html+=`<circle cx="32" cy="32" r="9" fill="${r.c}" opacity="0.25"/>`;
  svg.innerHTML=html;
  document.getElementById('app-adi').style.color=r.c;
  document.getElementById('piyasa-etiket').textContent=r.txt;
  document.getElementById('piyasa-etiket').style.color=r.c;
  document.getElementById('piyasa-alt').textContent=r.alt;
  document.getElementById('piyasa-durum').style.background=r.bg;
}

function basari(s) {
  let b=50+(s.score||0)*7;
  if(s.rsi<35) b+=8; if(s.rsi<25) b+=8;
  if(s.isHighPotential) b+=5; if(s.mtfKonfirm) b+=8;
  if(s.volume&&s.volume.isHigh) b+=4;
  if(s.fibonacci&&s.fibonacci.atSupport) b+=6;
  if(s.orderBook&&s.orderBook.bullish) b+=5;
  if(s.whale&&s.whale.whaleBullish) b+=6;
  if(s.funding&&s.funding.isVeryNegative) b+=5;
  if(s.sentiment&&s.sentiment.isExtremeFear) b+=4;
  return Math.min(Math.max(Math.round(b),35),94);
}

function guvenlikSkoru(s) {
  let gs=0;
  gs+=Math.round(basari(s)/10);
  gs+=Math.min(s.score||0,10);
  if(s.mtfKonfirm) gs+=10;
  if(s.whale&&s.whale.whaleBullish) gs+=8;
  if(s.funding&&s.funding.isVeryNegative) gs+=8;
  if(s.funding&&s.funding.isNegative) gs+=4;
  if(s.orderBook&&s.orderBook.bullish) gs+=6;
  if(s.orderBook&&s.orderBook.buyWall) gs+=4;
  if(s.fibonacci&&s.fibonacci.atSupport) gs+=5;
  if(s.sentiment&&s.sentiment.isExtremeFear) gs+=5;
  if(s.sentiment&&s.sentiment.isFear) gs+=3;
  if(s.volume&&s.volume.isHigh) gs+=3;
  if(s.atr&&s.atr.riskReward>=2) gs+=5;
  if(s.atr&&s.atr.riskReward>=1.5) gs+=3;
  if(s.atr&&s.atr.stopLossPct&&s.atr.stopLossPct<2) gs+=4;
  return gs;
}

function sure(s) {
  const tp1=s.atr&&s.atr.tp1Pct?s.atr.tp1Pct:2;
  if(tp1>=5) return '2-4s'; if(tp1>=3) return '4-8s';
  if(tp1>=2) return '8-24s'; return '1-3g';
}

function renk(skor) {
  if(skor>=8) return '#00FF88'; if(skor>=6) return '#39d353';
  if(skor>=4) return '#3FB950'; return '#2ea84c';
}

function etiket(skor) {
  if(skor>=8) return 'MÜKEMMEL AL'; if(skor>=6) return 'ÇOK GÜÇLÜ AL';
  if(skor>=4) return 'GÜÇLÜ AL'; if(skor>=2) return 'AL'; return 'ZAYIF AL';
}

function fmt(n) {
  if(!n&&n!==0) return '-';
  return Number(n).toLocaleString('tr-TR',{maximumFractionDigits:6});
}

function fiyatSatiriHTML(s) {
  const alisFiyat = s.lastClose;
  const anlik     = anlikFiyatlar[s.symbol];
  const alisStr   = '$' + fmt(alisFiyat);
  if (!anlik) {
    return `<div class="fiyat-satir">
      <span style="font-size:11px;color:#8B949E">Alış:</span>
      <span class="fiyat-alis">${alisStr}</span>
    </div>`;
  }
  const fark    = ((anlik - alisFiyat) / alisFiyat * 100);
  const farkStr = (fark >= 0 ? '+' : '') + fark.toFixed(2) + '%';
  const farkRenk = fark > 0 ? '#3FB950' : fark < 0 ? '#F85149' : '#8B949E';
  const farkBg   = fark > 0 ? '#0d1a0d' : fark < 0 ? '#1a0d0d' : '#161B22';
  return `<div class="fiyat-satir">
    <span style="font-size:11px;color:#8B949E">Alış:</span>
    <span class="fiyat-alis">${alisStr}</span>
    <span style="font-size:11px;color:#8B949E">Anlık:</span>
    <span class="fiyat-anlik" style="color:${farkRenk}">$${fmt(anlik)}</span>
    <span class="fiyat-fark" style="color:${farkRenk};background:${farkBg}">${farkStr}</span>
  </div>`;
}

function gvToggle(i) {
  const detay=document.getElementById('gv-detay-'+i);
  const ok=document.getElementById('gv-ok-'+i);
  if(!detay) return;
  const acik=detay.classList.toggle('acik');
  ok.textContent=acik?'▲':'▼';
}

function liste() {
  if(aktifFiltre==='firsat') return sinyaller.filter(s=>s.isHighPotential);
  if(aktifFiltre==='mtf')    return sinyaller.filter(s=>s.mtfKonfirm);
  if(aktifFiltre==='guclu')  return sinyaller.filter(s=>s.score>=4);
  if(aktifFiltre==='whale')  return sinyaller.filter(s=>s.whale&&s.whale.whaleBullish);
  return sinyaller;
}

      <div class="sentiment-ust"><div class="sentiment-label" style="color:${sgR}">${sent.label||'Bilinmiyor'}</div><div class="sentiment-val" style="color:${sgR}">${sent.value||'--'}</div></div>
      <div class="sentiment-bg"><div class="sentiment-dolu" style="width:${sent.value||50}%;background:${sgR}"></div></div>
    </div>
    <div class="yorum-satir"><span class="yorum-nokta">▸</span><span class="yorum-txt">${
      sent.isExtremeFear?'Piyasada aşırı korku var — tarihsel alım fırsatı.':
      sent.isFear?'Korku hakim — AL sinyalleri bu ortamda daha güvenilir.':
      sent.isExtremeGreed?'Aşırı açgözlülük — düzeltme riski yüksek.':
      sent.isGreed?'Açgözlülük var — stop-loss seviyelerine dikkat et.':
      'Piyasa nötr — teknik analiz belirleyici.'
    }</span></div>`;

  return `
    <div class="modal-bar"></div>
    <div class="modal-ust">
      <div>
        <div class="modal-coin">${sym}</div>
        <div class="modal-fiyat-wrap">
          <div class="modal-fiyat-alis">Alış: $${fmt(s.lastClose)}</div>
          <div class="modal-fiyat-anlik" style="color:${farkRenk}">Anlık: $${anlik?fmt(anlik):'—'} ${fark!==null?`<span style="font-size:12px">(${fark>=0?'+':''}${fark.toFixed(2)}%)</span>`:''}</div>
        </div>
      </div>
      <div class="modal-rozet" style="background:${r}">${etiket(s.score)}</div>
    </div>
    ${s.isHighPotential?`<div class="firsat-bant" style="margin:0 20px;border-radius:8px;padding:8px">🔥 YÜKSEK POTANSİYEL · Max +%${s.atr&&s.atr.tp3Pct}</div>`:''}
    ${accBolum('ozet','Alış Güveni & Özet','🛡️',ozet,true)}
    ${accBolum('seviye','Fiyat Seviyeleri','🎯',seviyeler,false)}
    ${accBolum('teknik','Teknik Göstergeler','📊',teknik,false)}
    ${accBolum('whale','Whale & Order Book','🐋',wf,false)}
    ${accBolum('duyarlilik','Piyasa Duyarlılığı','🧠',duyarlilik,false)}
    <div class="kapat-btn" onclick="document.getElementById('modal').classList.remove('acik')">Kapat</div>`;
}

function piyasaYorumu(s) {
  const y=[];
  if(s.rsi<30) y.push('RSI aşırı satım bölgesinde — güçlü geri dönüş sinyali.');
  if(s.trend&&s.trend.goldenCross) y.push('Golden Cross oluştu — uzun vadeli yükseliş başlangıcı olabilir.');
  if(s.mtfKonfirm) y.push('4 saatlik grafik de AL diyor — çok güçlü konfirmasyon.');
  if(s.volume&&s.volume.isHigh) y.push('Hacim '+s.volume.ratio+'x ortalamanın üzerinde — hareket güçlü.');
  if(s.fibonacci&&s.fibonacci.atSupport) y.push('Fibonacci destek seviyesinde — geri dönüş olasılığı yüksek.');
  if(s.whale&&s.whale.whaleBullish) y.push('Balina alımları tespit edildi — kurumsal ilgi var.');
  if(s.orderBook&&s.orderBook.bullish) y.push('Order book alım ağırlıklı — kısa vadede yükseliş baskısı.');
  if(s.funding&&s.funding.isVeryNegative) y.push('Funding rate negatif — short pozisyonlar sıkışmış.');
  if(s.sentiment&&s.sentiment.isExtremeFear) y.push('Korku endeksi çok düşük — tarihsel dip bölgesi.');
  if(s.isHighPotential) y.push('Yüksek potansiyel — TP3\'e kadar %'+(s.atr&&s.atr.tp3Pct)+' hedefleniyor.');
  if(y.length===0) y.push('Teknik göstergeler alım yönünde sinyal veriyor.');
  return y;
}

function memeRadarHTML(data) {
  if(!data||!data.coins) return '<div class="bos">Veri yok</div>';
  const btc=data.btcDominance||{};
  const trending=data.trending||[];
  const coins=data.coins||[];
  const header=`<div style="padding:12px 16px;background:#0D1117;border-bottom:1px solid #21262D;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:16px;font-weight:700;color:#FF6B35">Meme Radar</span>
      <span style="font-size:11px;color:#8B949E">${data.scannedAt?new Date(data.scannedAt).toLocaleTimeString('tr-TR'):''}</span>
    </div>
    <div style="display:flex;gap:8px">
      <div style="background:#161B22;border-radius:8px;padding:8px 12px;flex:1;text-align:center"><div style="font-size:10px;color:#8B949E;margin-bottom:2px">BTC Dom</div><div style="font-size:18px;font-weight:700;color:${btc.isStrongAltSeason?'#00FF88':btc.isAltSeason?'#3FB950':'#F85149'}">${btc.dominance||'-'}%</div></div>
      <div style="background:#161B22;border-radius:8px;padding:8px 12px;flex:1;text-align:center"><div style="font-size:10px;color:#8B949E;margin-bottom:2px">Sinyal</div><div style="font-size:18px;font-weight:700;color:#FF6B35">${coins.length}</div></div>
      <div style="background:#161B22;border-radius:8px;padding:8px 12px;flex:1;text-align:center"><div style="font-size:10px;color:#8B949E;margin-bottom:2px">Trending</div><div style="font-size:18px;font-weight:700;color:#FFD700">${trending.length}</div></div>
    </div>
    ${trending.length>0?`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">${trending.slice(0,6).map(t=>`<span style="background:#1a1500;border:1px solid #FFD700;border-radius:12px;padding:2px 8px;font-size:10px;color:#FFD700">${t.symbol}</span>`).join('')}</div>`:''}
  </div>`;
  if(coins.length===0) return header+'<div class="bos">Şu an aktif meme sinyali yok</div>';
  return header+coins.map(c=>{
    const ac=c.alert==='ROKET'?'#FF0044':c.alert==='ATES'?'#FF4444':c.alert==='SICAK'?'#FF6B35':'#FFD700';
    const ae=c.alert==='ROKET'?'🚀':c.alert==='ATES'?'🔥':c.alert==='SICAK'?'⚡':'👀';
    const at=c.alert==='ROKET'?'ROKET!':c.alert==='ATES'?'ATEŞ — İzle!':c.alert==='SICAK'?'SICAK — Momentum':'İZLE';
    return `<div style="margin:8px 16px;background:#161B22;border-radius:16px;border:1px solid #21262D;border-left:5px solid ${ac};overflow:hidden">
      <div style="background:${ac}15;padding:5px 12px;display:flex;justify-content:space-between">
        <span style="font-size:11px;font-weight:700;color:${ac}">${ae} ${at}</span>
        ${c.isTrending?'<span style="font-size:10px;color:#FFD700;font-weight:700">TRENDING</span>':''}
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 14px 6px">
        <div><div style="font-size:20px;font-weight:700">${c.symbol.replace('USDT','').replace('1000','')}</div><div style="font-size:11px;color:#8B949E">Skor: ${c.memeScore}</div></div>
        <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:#C9D1D9">$${Number(c.lastClose).toLocaleString('tr-TR',{maximumFractionDigits:8})}</div><div style="font-size:13px;font-weight:700;color:${c.chg1h>=0?'#3FB950':'#F85149'}">${c.chg1h>=0?'+':''}${c.chg1h}% (1s)</div></div>
      </div>
      <div style="display:flex;gap:6px;padding:0 14px 10px">
        <div style="flex:1;background:#0D1117;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#8B949E;margin-bottom:2px">HACİM</div><div style="font-size:15px;font-weight:700;color:${c.volumeRatio>=5?'#FF4444':c.volumeRatio>=3?'#FF6B35':'#FFD700'}">${c.volumeRatio}x</div></div>
        <div style="flex:1;background:#0D1117;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#8B949E;margin-bottom:2px">4S</div><div style="font-size:15px;font-weight:700;color:${c.chg4h>=0?'#3FB950':'#F85149'}">${c.chg4h>=0?'+':''}${c.chg4h}%</div></div>
        <div style="flex:1;background:#0D1117;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#8B949E;margin-bottom:2px">24S</div><div style="font-size:15px;font-weight:700;color:${c.chg24h>=0?'#3FB950':'#F85149'}">${c.chg24h>=0?'+':''}${c.chg24h}%</div></div>
        <div style="flex:1;background:#0D1117;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#8B949E;margin-bottom:2px">RİSK</div><div style="font-size:13px;font-weight:700;color:${c.riskLevel==='EKSTREM'?'#FF0044':c.riskLevel==='YUKSEK'?'#F85149':c.riskLevel==='ORTA'?'#FFD700':'#3FB950'}">${c.riskLevel}</div></div>
      </div>
    </div>`;
  }).join('')+'<div style="height:40px"></div>';
}

function raporHTML() {
  const guclu=sinyaller.filter(s=>s.score>=4).length;
  const firsat=sinyaller.filter(s=>s.isHighPotential).length;
  const whale=sinyaller.filter(s=>s.whale&&s.whale.whaleBullish).length;
  const mtf=sinyaller.filter(s=>s.mtfKonfirm).length;
  const enIyi=sinyaller.filter(s=>s.mtfKonfirm||s.isHighPotential||s.score>=5).slice(0,10);
  return `<div class="rapor-wrap">
    <div class="rapor-baslik">Piyasa Raporu</div>
    <div class="rapor-zaman">${document.getElementById('guncelleme').textContent}</div>
    <div class="rapor-grid">
      <div class="rapor-kutu"><div class="rapor-sayi">${sinyaller.length}</div><div class="rapor-etiket">Toplam AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#00FF88">${guclu}</div><div class="rapor-etiket">Güçlü AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#FFD700">${firsat}</div><div class="rapor-etiket">Fırsat</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#8B5CF6">${whale}</div><div class="rapor-etiket">Whale</div></div>
    </div>
    <div style="font-size:14px;font-weight:700;color:#C9D1D9;margin-bottom:10px">En İyi Fırsatlar</div>
    ${enIyi.length===0?'<div class="bos">Şu an güçlü fırsat yok</div>':enIyi.map(s=>`
      <div class="rapor-satir" onclick="modalAc(${s._idx})">
        <div><div class="rapor-coin">${s.symbol.replace('USDT','')}</div><div class="rapor-alt">${s.mtfKonfirm?'✓ MTF':''}${s.whale&&s.whale.whaleBullish?' 🐋':''}${s.isHighPotential?' 🔥':''}</div></div>
        <div class="rapor-sag"><div class="rapor-yuzde" style="color:${renk(s.score)}">%${Math.min(Math.round(guvenlikSkoru(s)/80*100),99)} güven</div><div class="rapor-sure">${sure(s)}</div>${s.atr&&s.atr.tp3Pct>0?`<div class="rapor-hedef">Max +%${s.atr.tp3Pct}</div>`:''}</div>
      </div>`).join('')}
  </div>`;
}

function render() {
  const el = document.getElementById('icerik');
  if (aktifFiltre==='guvenli') { el.innerHTML=guvenlikPanelHTML(); return; }
  if (aktifFiltre==='meme') {
    el.innerHTML='<div class="yukleme"><div class="spinner"></div><div>Meme Radar taranıyor...</div></div>';
    fetch(BASE+'/api/meme/radar').then(r=>r.json()).then(data=>{el.innerHTML=memeRadarHTML(data);}).catch(()=>{el.innerHTML='<div class="bos">Bağlantı hatası</div>';});
    return;
  }
  if (aktifFiltre==='rapor') { el.innerHTML=raporHTML(); return; }
  const l=liste();
  if(l.length===0){el.innerHTML='<div class="bos">Bu filtre için sinyal yok</div>';return;}
  el.innerHTML=l.map(s=>kartHTML(s)).join('')+'<div style="height:40px"></div>';
}

function filtreSec(f, btn) {
  aktifFiltre=f;
  document.querySelectorAll('.filtre-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  render();
}

function modalAc(idx) {
  const s=sinyaller[idx];
  if(!s) return;
  document.getElementById('modal-icerik').innerHTML=modalHTML(s);
  document.getElementById('modal').classList.add('acik');
  document.getElementById('modal-icerik').scrollTop=0;
}

function modalKapat(e) {
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('acik');
}

function accToggle(id) {
  document.getElementById('acc-'+id).classList.toggle('acik');
  document.getElementById('ikon-'+id).classList.toggle('acik');
}

sinyalCek();
zamanlayici=setInterval(sinyalCek,60000);
setInterval(anlikFiyatGuncelle,30000);
</script>
