<style>

body { background:#0A0E17; color:#fff; font-family:-apple-system,sans-serif; overflow-x:hidden; }

.ustbar { position:sticky; top:0; background:#0A0E17; padding:12px 16px 8px; z-index:100; border-bottom:1px solid #21262D; }

.kart { margin:8px 16px; background:#161B22; border-radius:16px; border:1px solid #21262D; border-left:5px solid #3FB950; overflow:hidden; cursor:pointer; transition:transform 0.15s; }

.acc-item { border-bottom:1px solid #21262D; }

.teknik-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.teknik-kutu { background:#161B22; border-radius:10px; padding:10px; text-align:center; }
.teknik-etiket { font-size:9px; color:#8B949E; margin-bottom:4px; }

.sentiment-bar { background:#161B22; border-radius:12px; padding:14px; margin-bottom:10px; }
.sentiment-ust { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.sentiment-label { font-size:13px; font-weight:600; }
.sentiment-val { font-size:22px; font-weight:700; }
.sentiment-bg { height:10px; background:#21262D; border-radius:5px; overflow:hidden; }
.sentiment-dolu { height:10px; border-radius:5px; }

.yorum-satir { display:flex; gap:8px; margin-bottom:8px; }
.yorum-nokta { color:#58A6FF; font-size:11px; margin-top:2px; flex-shrink:0; }
.yorum-txt { color:#C9D1D9; font-size:13px; line-height:1.5; }

.neden-satir { display:flex; gap:8px; margin-bottom:6px; }
.neden-ikon { font-size:11px; flex-shrink:0; margin-top:2px; }
.neden-txt { font-size:13px; color:#8B949E; }

.kapat-btn { margin:16px 20px 0; background:#161B22; border:1px solid #30363D; border-radius:12px; padding:15px; text-align:center; color:#8B949E; font-size:15px; font-weight:700; cursor:pointer; }

.yukleme { text-align:center; padding:60px 20px; color:#8B949E; }
.spinner { width:40px; height:40px; border:3px solid #21262D; border-top-color:#58A6FF; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

.rapor-wrap { padding:16px; }
.rapor-baslik { font-size:20px; font-weight:700; margin-bottom:4px; }
.rapor-zaman { font-size:11px; color:#8B949E; margin-bottom:16px; }
.rapor-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
.rapor-kutu { background:#161B22; border-radius:12px; padding:12px; text-align:center; }
.rapor-sayi { font-size:20px; font-weight:700; }
.rapor-etiket { font-size:10px; color:#8B949E; margin-top:4px; }
.rapor-satir { display:flex; justify-content:space-between; align-items:center; background:#161B22; border-radius:12px; padding:14px; margin-bottom:8px; border:1px solid #21262D; cursor:pointer; }
.rapor-coin { font-size:16px; font-weight:700; }
.rapor-alt { font-size:11px; color:#8B949E; margin-top:2px; }
.rapor-sag { text-align:right; }
.rapor-yuzde { font-size:13px; font-weight:700; }
.rapor-sure { font-size:11px; color:#58A6FF; margin-top:2px; }
.rapor-hedef { font-size:11px; color:#FFD700; margin-top:2px; }
.bos { text-align:center; padding:60px 20px; color:#8B949E; font-size:14px; }
.filtre-btn.meme-f.aktif { background:#FF6B35; border-color:#FF6B35; color:#fff; }
.guvenlik-bolum { background:#0D1117; border-bottom:1px solid #21262D; padding:10px 16px; }
.guvenlik-baslik { font-size:11px; color:#8B949E; font-weight:600; margin-bottom:8px; letter-spacing:0.5px; }
.guvenlik-liste { display:flex; flex-direction:column; gap:6px; }
.gv-kart { display:flex; align-items:center; gap:10px; background:#161B22; border-radius:10px; padding:8px 12px; border:1px solid #21262D; cursor:pointer; transition:all 0.2s; }
.gv-kart:active { opacity:0.8; }
.gv-kart.acik { border-color:#30363D; }
.gv-sira { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.gv-sol { flex:1; min-width:0; }
.gv-coin { font-size:14px; font-weight:700; color:#fff; }
.gv-badges { display:flex; gap:4px; margin-top:3px; flex-wrap:wrap; }
.gv-badge { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:600; }
.gv-sag { text-align:right; flex-shrink:0; }
.gv-skor { font-size:13px; font-weight:700; }
.gv-kar { font-size:10px; color:#8B949E; margin-top:1px; }
.gv-detay { display:none; padding:8px 12px 10px; background:#0D1117; border-radius:0 0 10px 10px; margin-top:-6px; border:1px solid #30363D; border-top:none; }
.gv-detay.acik { display:block; }
.gv-detay-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.gv-detay-kutu { background:#161B22; border-radius:6px; padding:6px; text-align:center; }
.gv-detay-etiket { font-size:8px; color:#8B949E; margin-bottom:2px; }
.gv-detay-deger { font-size:12px; font-weight:700; }
.filtre-bar-yeni { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; scrollbar-width:none; background:#0A0E17; border-bottom:1px solid #21262D; }
.filtre-bar-yeni::-webkit-scrollbar { display:none; }
.piyasa-durum { display:flex; flex-direction:column; align-items:center; padding:16px 16px 8px; }
.sun-wrap { position:relative; width:64px; height:64px; margin-bottom:8px; }
.sun-core { width:40px; height:40px; border-radius:50%; position:absolute; top:12px; left:12px; }
.sun-ray { position:absolute; width:4px; border-radius:2px; transform-origin:bottom center; }
.piyasa-etiket { font-size:13px; font-weight:700; letter-spacing:1px; }
.piyasa-alt { font-size:11px; color:#8B949E; margin-top:2px; }
.app-adi { font-size:26px; font-weight:700; letter-spacing:2px; }
</style>
</head>
<body>

<div style="position:sticky;top:0;background:#0A0E17;z-index:100;border-bottom:1px solid #21262D">
  <div class="piyasa-durum">
  <div class="app-adi" id="app-adi">SUNDAY</div>
  <div class="sun-wrap" id="sun-wrap">
    <svg width="64" height="64" viewBox="0 0 64 64" id="sun-svg"></svg>
  </div>
  <div class="piyasa-etiket" id="piyasa-etiket">Analiz ediliyor...</div>
  <div class="piyasa-alt" id="piyasa-alt">Piyasa durumu hesaplanıyor</div>
</div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px">
    <div>
      <div style="font-size:20px;font-weight:700">Kripto Sinyaller</div>
      <div style="font-size:11px;color:#8B949E;margin-top:2px" id="guncelleme">Yükleniyor...</div>
    </div>
    <div id="fg-badge" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;background:#1a1500;border:1px solid #30363D">
      <span id="fg-emoji">😐</span>
      <span id="fg-val" style="color:#8B949E">--</span>
    </div>
  </div>
  <div class="guvenlik-bolum">
    <div class="guvenlik-baslik">EN GÜVENLİ ALIM FIRSATLARI</div>
    <div class="guvenlik-liste" id="guvenlik-liste">
      <div style="text-align:center;padding:12px;color:#8B949E;font-size:12px">Yükleniyor...</div>
    </div>
  </div>
  <div class="filtre-bar-yeni">
    <button class="filtre-btn aktif"    onclick="filtreSec('tumu',this)">Tümü</button>
    <button class="filtre-btn firsat-f" onclick="filtreSec('firsat',this)">🔥 Fırsat</button>
    <button class="filtre-btn mtf-f"    onclick="filtreSec('mtf',this)">✓ MTF</button>
    <button class="filtre-btn guclu-f"  onclick="filtreSec('guclu',this)">⚡ Skor 4+</button>
    <button class="filtre-btn whale-f"  onclick="filtreSec('whale',this)">🐋 Whale</button>
    <button class="filtre-btn meme-f"   onclick="filtreSec('meme',this)">🚀 Meme</button>
    <button class="filtre-btn rapor-f"  onclick="filtreSec('rapor',this)">📊 Rapor</button>
  </div>
</div>

<script>
const BASE = 'https://invigorating-gentleness-production.up.railway.app';
let sinyaller = [], aktifFiltre = 'tumu', zamanlayici;
function guvenlikSkoru(s) {
  var gs = 0;
  var basariPuan = basari(s);
  gs += Math.round(basariPuan / 10);
  gs += Math.min(s.score || 0, 10);
  if (s.mtfKonfirm)                          gs += 10;
  if (s.whale && s.whale.whaleBullish)        gs += 8;
  if (s.funding && s.funding.isVeryNegative)  gs += 8;
  if (s.funding && s.funding.isNegative)      gs += 4;
  if (s.orderBook && s.orderBook.bullish)     gs += 6;
  if (s.orderBook && s.orderBook.buyWall)     gs += 4;
  if (s.fibonacci && s.fibonacci.atSupport)   gs += 5;
  if (s.sentiment && s.sentiment.isExtremeFear) gs += 5;
  if (s.sentiment && s.sentiment.isFear)      gs += 3;
  if (s.volume && s.volume.isHigh)            gs += 3;
  if (s.atr && s.atr.riskReward >= 2)         gs += 5;
  if (s.atr && s.atr.riskReward >= 1.5)       gs += 3;
  if (s.atr && s.atr.stopLossPct && s.atr.stopLossPct < 2) gs += 4;
  return gs;
}

function guvenlikGuncelle() {
  var el = document.getElementById('guvenlik-liste');
  if (!el || sinyaller.length === 0) return;

  var sirali = sinyaller
    .filter(function(s) { return s.score >= 2; })
    .map(function(s) { return Object.assign({}, s, { guvenlikSkoru: guvenlikSkoru(s) }); })
    .sort(function(a, b) { return b.guvenlikSkoru - a.guvenlikSkoru; })
    .slice(0, 7);

  el.innerHTML = sirali.map(function(s, i) {
    var gs     = s.guvenlikSkoru;
    var maxGs  = 80;
    var gsPct  = Math.min(Math.round(gs / maxGs * 100), 99);
    var renk1  = gsPct >= 80 ? '#00FF88' : gsPct >= 65 ? '#3FB950' : gsPct >= 50 ? '#D29922' : '#F85149';
    var siraRenk = i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : '#30363D';
    var sym    = s.symbol ? s.symbol.replace('USDT','') : '';
    var karPct = s.atr && s.atr.tp3Pct ? s.atr.tp3Pct : s.atr && s.atr.tp1Pct ? s.atr.tp1Pct : 0;

    var badges = '';
    if (s.mtfKonfirm)                       badges += '<span class="gv-badge" style="background:#1a2a1a;color:#3FB950;border:1px solid #3FB950">MTF</span>';
    if (s.whale && s.whale.whaleBullish)     badges += '<span class="gv-badge" style="background:#1a1030;color:#8B5CF6;border:1px solid #8B5CF6">WHALE</span>';
    if (s.funding && s.funding.isNegative)   badges += '<span class="gv-badge" style="background:#0d1f0d;color:#3FB950;border:1px solid #3FB950">FR-</span>';
    if (s.isHighPotential)                   badges += '<span class="gv-badge" style="background:#1a1500;color:#FFD700;border:1px solid #FFD700">FIRSAT</span>';

    return '<div>' +
      '<div class="gv-kart" onclick="gvToggle(' + i + ',' + s._idx + ')" id="gv-kart-' + i + '">' +
        '<div class="gv-sira" style="background:' + siraRenk + '15;color:' + siraRenk + ';border:1px solid ' + siraRenk + '">' + (i+1) + '</div>' +
        '<div class="gv-sol">' +
          '<div class="gv-coin">' + sym + '</div>' +
          '<div class="gv-badges">' + badges + '</div>' +
        '</div>' +
        '<div class="gv-sag">' +
          '<div class="gv-skor" style="color:' + renk1 + '">%' + gsPct + ' güven</div>' +
          '<div class="gv-kar">Max +%' + karPct + ' kar</div>' +
        '</div>' +
        '<div style="margin-left:6px;font-size:10px;color:#30363D" id="gv-ok-' + i + '">▼</div>' +
      '</div>' +
      '<div class="gv-detay" id="gv-detay-' + i + '">' +
        '<div class="gv-detay-grid">' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">GİRİŞ</div><div class="gv-detay-deger" style="color:#fff;font-size:10px">$' + Number(s.lastClose).toLocaleString('tr-TR',{maximumFractionDigits:4}) + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">STOP</div><div class="gv-detay-deger" style="color:#F85149;font-size:10px">$' + (s.atr&&s.atr.stopLoss?Number(s.atr.stopLoss).toLocaleString('tr-TR',{maximumFractionDigits:4}):'-') + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">TP1</div><div class="gv-detay-deger" style="color:#3FB950;font-size:10px">$' + (s.atr&&s.atr.takeProfit1?Number(s.atr.takeProfit1).toLocaleString('tr-TR',{maximumFractionDigits:4}):'-') + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">TP3</div><div class="gv-detay-deger" style="color:#00FF88;font-size:10px">$' + (s.atr&&s.atr.takeProfit3?Number(s.atr.takeProfit3).toLocaleString('tr-TR',{maximumFractionDigits:4}):'-') + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">RSI</div><div class="gv-detay-deger" style="color:' + (s.rsi<35?'#00FF88':s.rsi>70?'#F85149':'#C9D1D9') + '">' + s.rsi + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">R/R</div><div class="gv-detay-deger" style="color:#FFD700">' + (s.atr&&s.atr.riskReward||'-') + 'x</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">HACİM</div><div class="gv-detay-deger" style="color:' + (s.volume&&s.volume.isHigh?'#00FF88':'#C9D1D9') + '">' + (s.volume?s.volume.ratio+'x':'-') + '</div></div>' +
          '<div class="gv-detay-kutu"><div class="gv-detay-etiket">SÜRE</div><div class="gv-detay-deger" style="color:#58A6FF;font-size:10px">' + sure(s) + '</div></div>' +
        '</div>' +

async function sinyalCek() {

function sunGuncelle(sinyaller, sentiment) {
  var svg = document.getElementById('sun-svg');
  var etiket = document.getElementById('piyasa-etiket');
  var alt = document.getElementById('piyasa-alt');
  var appAdi = document.getElementById('app-adi');
  if (!svg) return;

  var guclu  = sinyaller.filter(function(s) { return s.score >= 4; }).length;
  var firsat = sinyaller.filter(function(s) { return s.isHighPotential; }).length;
  var toplam = sinyaller.length;

  var mod = 'notr';
  if (toplam === 0) mod = 'notr';
  else if (guclu >= 20 || firsat >= 10) mod = 'boga_guclu';
  else if (guclu >= 8  || firsat >= 4)  mod = 'boga';
  else if (toplam >= 5)                 mod = 'olumlu';
  if (sentiment && sentiment.isExtremeFear)   mod = 'korku';
  if (sentiment && sentiment.isExtremeGreed && guclu < 5) mod = 'uyari';

  var renkler = {
    boga_guclu: { core:'#FFD700', ray:'#FFD700', bg:'#1a1500', etiket:'#FFD700', adi:'#FFD700', txt:'BOĞA SEZONU', alt:'Güçlü yükseliş trendi — Fırsatlar bol!' },
    boga:       { core:'#FF9500', ray:'#FF9500', bg:'#1a1000', etiket:'#FF9500', adi:'#FF9500', txt:'BOĞA PİYASASI', alt:'Alım sinyalleri güçlü — İyi fırsatlar var' },
    olumlu:     { core:'#3FB950', ray:'#3FB950', bg:'#0d1a0d', etiket:'#3FB950', adi:'#3FB950', txt:'OLUMLu SEYIR', alt:'Piyasa yükseliş eğiliminde' },
    notr:       { core:'#58A6FF', ray:'#58A6FF', bg:'#0d1520', etiket:'#58A6FF', adi:'#58A6FF', txt:'NÖTR PİYASA', alt:'Belirgin bir yön yok — Dikkatli ol' },
    korku:      { core:'#8B5CF6', ray:'#8B5CF6', bg:'#100d1a', etiket:'#8B5CF6', adi:'#8B5CF6', txt:'KORKU SEVİYESİ', alt:'Aşırı korku var — Alım fırsatı doğabilir' },
    uyari:      { core:'#F85149', ray:'#F85149', bg:'#1a0d0d', etiket:'#F85149', adi:'#F85149', txt:'AŞIRI AÇGÖZLÜLÜK', alt:'Dikkat — Düzeltme riski yüksek' }
  };

  var r = renkler[mod] || renkler['notr'];

  var raylar = [0,45,90,135,180,225,270,315];
  var svgIcerik = '<circle cx="32" cy="32" r="14" fill="' + r.core + '" opacity="0.95"/>';
  raylar.forEach(function(aci) {
    var rad = aci * Math.PI / 180;
    var x1 = 32 + Math.cos(rad) * 19;
    var y1 = 32 + Math.sin(rad) * 19;
    var x2 = 32 + Math.cos(rad) * 28;
    var y2 = 32 + Math.sin(rad) * 28;
    svgIcerik += '<line x1="' + x1.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="' + r.ray + '" stroke-width="3" stroke-linecap="round" opacity="0.8"/>';
  });
  var kucukRaylar = [22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5];
  kucukRaylar.forEach(function(aci) {
    var rad = aci * Math.PI / 180;
    var x1 = 32 + Math.cos(rad) * 17;
    var y1 = 32 + Math.sin(rad) * 17;
    var x2 = 32 + Math.cos(rad) * 23;
    var y2 = 32 + Math.sin(rad) * 23;
    svgIcerik += '<line x1="' + x1.toFixed(1) + '" y1="' + y1.toFixed(1) + '" x2="' + x2.toFixed(1) + '" y2="' + y2.toFixed(1) + '" stroke="' + r.ray + '" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>';
  });

  svg.innerHTML = svgIcerik;

  document.getElementById('piyasa-etiket').textContent = r.txt;
  document.getElementById('piyasa-etiket').style.color = r.etiket;
  document.getElementById('piyasa-alt').textContent = r.alt;
  document.getElementById('app-adi').style.color = r.adi;
  document.querySelector('.piyasa-durum').style.background = r.bg;
}
function basari(s) {
  let b = 50 + (s.score||0)*7;
  if (s.rsi < 35) b += 8;
  if (s.rsi < 25) b += 8;
  if (s.isHighPotential) b += 5;
  if (s.mtfKonfirm) b += 8;
  if (s.volume && s.volume.isHigh) b += 4;
  if (s.fibonacci && s.fibonacci.atSupport) b += 6;
  if (s.orderBook && s.orderBook.bullish) b += 5;
  if (s.whale && s.whale.whaleBullish) b += 6;
  if (s.funding && s.funding.isVeryNegative) b += 5;
  if (s.sentiment && s.sentiment.isExtremeFear) b += 4;
  return Math.min(Math.max(Math.round(b), 35), 94);
}

function sure(s) {
  const tp1 = s.atr && s.atr.tp1Pct ? s.atr.tp1Pct : 2;
  if (tp1 >= 5) return '2-4s';
  if (tp1 >= 3) return '4-8s';
  if (tp1 >= 2) return '8-24s';
  return '1-3g';
}

function renk(skor) {
  if (skor >= 8) return '#00FF88';
  if (skor >= 6) return '#39d353';
  if (skor >= 4) return '#3FB950';
  return '#2ea84c';
}

function etiket(skor) {
  if (skor >= 8) return 'MÜKEMMEL AL';
  if (skor >= 6) return 'ÇOK GÜÇLÜ AL';
  if (skor >= 4) return 'GÜÇLÜ AL';
  if (skor >= 2) return 'AL';
  return 'ZAYIF AL';
}

function fmt(n) {
  if (!n && n !== 0) return '-';
  return Number(n).toLocaleString('tr-TR', {maximumFractionDigits:6});
}

function liste() {
  if (aktifFiltre === 'firsat') return sinyaller.filter(s => s.isHighPotential);
  if (aktifFiltre === 'mtf')    return sinyaller.filter(s => s.mtfKonfirm);
  if (aktifFiltre === 'guclu')  return sinyaller.filter(s => s.score >= 4);
  if (aktifFiltre === 'whale')  return sinyaller.filter(s => s.whale && s.whale.whaleBullish);
  if (aktifFiltre === 'rapor')  return [];
  return sinyaller;
}

    ${piyasaYorumu(s).map(y=>`<div class="yorum-satir"><span class="yorum-nokta">▸</span><span class="yorum-txt">${y}</span></div>`).join('')}`;

  // Bölüm 2: Alış/Satış seviyeleri
  const seviyeler = `
    <div class="seviye-grid">
      <div class="seviye-kart" style="border-left-color:#fff"><div class="seviye-etiket">GİRİŞ</div><div class="seviye-deger" style="color:#fff">$${fmt(s.lastClose)}</div><div class="seviye-alt">Şu anki fiyat</div></div>
      <div class="seviye-kart" style="border-left-color:#F85149"><div class="seviye-etiket">STOP LOSS</div><div class="seviye-deger" style="color:#F85149">$${fmt(s.atr&&s.atr.stopLoss)}</div><div class="seviye-alt">-%${s.atr&&s.atr.stopLossPct} kayıp</div></div>
      <div class="seviye-kart" style="border-left-color:#3FB950"><div class="seviye-etiket">HEDEF 1</div><div class="seviye-deger" style="color:#3FB950">$${fmt(s.atr&&s.atr.takeProfit1)}</div><div class="seviye-alt">+%${s.atr&&s.atr.tp1Pct}</div></div>
      <div class="seviye-kart" style="border-left-color:#3FB950"><div class="seviye-etiket">HEDEF 2</div><div class="seviye-deger" style="color:#3FB950">$${fmt(s.atr&&s.atr.takeProfit2)}</div><div class="seviye-alt">+%${s.atr&&s.atr.tp2Pct}</div></div>
      <div class="seviye-kart" style="border-left-color:#00FF88"><div class="seviye-etiket">HEDEF 3</div><div class="seviye-deger" style="color:#00FF88">$${fmt(s.atr&&s.atr.takeProfit3)}</div><div class="seviye-alt">+%${s.atr&&s.atr.tp3Pct}</div></div>
      <div class="seviye-kart" style="border-left-color:#58A6FF"><div class="seviye-etiket">FİBONACCİ</div><div class="seviye-deger" style="color:#58A6FF;font-size:11px">$${fmt(s.fibonacci&&s.fibonacci.nearestSupport)}</div><div class="seviye-alt">Fib destek</div></div>
    </div>`;

  // Bölüm 3: Teknik göstergeler
  const teknik = `
    <div class="teknik-grid">
      <div class="teknik-kutu"><div class="teknik-etiket">RSI</div><div class="teknik-deger" style="color:${s.rsi<35?'#00FF88':s.rsi>70?'#F85149':'#C9D1D9'}">${s.rsi}</div><div class="teknik-alt">${s.rsi<35?'Aşırı satım':s.rsi>70?'Aşırı alım':'Normal'}</div></div>
      <div class="teknik-kutu"><div class="teknik-etiket">STOCH RSI K</div><div class="teknik-deger" style="color:${s.stochRSI&&s.stochRSI.k<20?'#00FF88':s.stochRSI&&s.stochRSI.k>80?'#F85149':'#C9D1D9'}">${s.stochRSI&&s.stochRSI.k||'-'}</div><div class="teknik-alt">${s.stochRSI&&s.stochRSI.k<20?'Aşırı satım':s.stochRSI&&s.stochRSI.k>80?'Aşırı alım':'Normal'}</div></div>
      <div class="teknik-kutu"><div class="teknik-etiket">HACİM</div><div class="teknik-deger" style="color:${s.volume&&s.volume.isHigh?'#00FF88':'#C9D1D9'}">${s.volume?s.volume.ratio+'x':'-'}</div><div class="teknik-alt">${s.volume&&s.volume.isHigh?'Yüksek':'Normal'}</div></div>
      <div class="teknik-kutu"><div class="teknik-etiket">TREND</div><div class="teknik-deger" style="font-size:11px;color:${s.trend&&s.trend.strength>0?'#3FB950':'#F85149'}">${s.trend&&s.trend.trend||'-'}</div><div class="teknik-alt">EMA trendi</div></div>
      <div class="teknik-kutu"><div class="teknik-etiket">FİB DESTEK</div><div class="teknik-deger" style="color:${s.fibonacci&&s.fibonacci.atSupport?'#00FF88':'#C9D1D9'}">${s.fibonacci&&s.fibonacci.atSupport?'EVET':'HAYIR'}</div><div class="teknik-alt">Seviyede mi</div></div>
      <div class="teknik-kutu"><div class="teknik-etiket">GOLDEN X</div><div class="teknik-deger" style="color:${s.trend&&s.trend.goldenCross?'#FFD700':'#C9D1D9'}">${s.trend&&s.trend.goldenCross?'EVET':'HAYIR'}</div><div class="teknik-alt">EMA kesişim</div></div>
    </div>
    <div style="margin-top:12px">
      ${(s.signals||[]).filter(sg=>sg.type==='BUY').map(sg=>`<div class="neden-satir"><span class="neden-ikon" style="color:#3FB950">▲</span><span class="neden-txt">${sg.reason}</span></div>`).join('')}
    </div>`;

  // Bölüm 4: Whale & Funding
  const wf = `
    <div class="whale-grid">
      <div class="whale-kutu">
        <div class="whale-etiket">🐋 Whale Alışlar</div>
        <div class="whale-deger" style="color:${s.whale&&s.whale.whaleBullish?'#00FF88':'#C9D1D9'}">${s.whale&&s.whale.whaleBuyCount||0}</div>
        <div class="whale-alt">Son 100 işlemde</div>
      </div>
      <div class="whale-kutu">
        <div class="whale-etiket">🐋 Whale Satışlar</div>
        <div class="whale-deger" style="color:${s.whale&&s.whale.whaleBearish?'#F85149':'#C9D1D9'}">${s.whale&&s.whale.whaleSellCount||0}</div>
        <div class="whale-alt">Son 100 işlemde</div>
      </div>
      <div class="whale-kutu">
        <div class="whale-etiket">📖 Alış/Satış Oranı</div>
        <div class="whale-deger" style="color:${s.orderBook&&s.orderBook.bidAskRatio>1.2?'#00FF88':s.orderBook&&s.orderBook.bidAskRatio<0.8?'#F85149':'#C9D1D9'}">${s.orderBook&&s.orderBook.bidAskRatio||'-'}</div>
        <div class="whale-alt">Order book</div>
      </div>
      <div class="whale-kutu">
        <div class="whale-etiket">💰 Funding Rate</div>
        <div class="whale-deger" style="color:${s.funding&&s.funding.isNegative?'#00FF88':s.funding&&s.funding.isPositive?'#F85149':'#C9D1D9'}">${s.funding?s.funding.fundingRate+'%':'-'}</div>
        <div class="whale-alt">${s.funding?s.funding.signal:'-'}</div>
      </div>
    </div>
    ${s.orderBook&&s.orderBook.buyWall?`<div class="yorum-satir"><span class="yorum-nokta" style="color:#00FF88">▸</span><span class="yorum-txt">$${fmt(s.orderBook.buyWallPrice)} seviyesinde güçlü alış duvarı tespit edildi.</span></div>`:''}
    ${s.orderBook&&s.orderBook.sellWall?`<div class="yorum-satir"><span class="yorum-nokta" style="color:#F85149">▸</span><span class="yorum-txt">$${fmt(s.orderBook.sellWallPrice)} seviyesinde güçlü satış duvarı tespit edildi.</span></div>`:''}`;

  // Bölüm 5: Piyasa duyarlılığı
  const sent = s.sentiment || {};
  const sgRenk = sent.isExtremeFear||sent.isFear ? '#F85149' : sent.isExtremeGreed||sent.isGreed ? '#3FB950' : '#D29922';
  const duyarlilik = `
    <div class="sentiment-bar">
      <div class="sentiment-ust">
        <div class="sentiment-label" style="color:${sgRenk}">${sent.label||'Bilinmiyor'}</div>
        <div class="sentiment-val" style="color:${sgRenk}">${sent.value||'--'}</div>
      </div>
      <div class="sentiment-bg"><div class="sentiment-dolu" style="width:${sent.value||50}%;background:${sgRenk}"></div></div>
    </div>
    <div class="yorum-satir"><span class="yorum-nokta">▸</span><span class="yorum-txt">
      ${sent.isExtremeFear ? 'Piyasada aşırı korku var. Tarihsel olarak bu seviyeler güçlü alım fırsatları sunmuştur.' :
        sent.isFear ? 'Piyasada korku hakim. Al sinyalleri bu ortamda daha güvenilir olabilir.' :
        sent.isExtremeGreed ? 'Aşırı açgözlülük var. Sinyalleri daha dikkatli değerlendirin, düzeltme riski yüksek.' :
        sent.isGreed ? 'Piyasada açgözlülük var. Stop-loss seviyelerine dikkat edin.' :
        'Piyasa nötr seyirde. Teknik analiz sinyalleri daha belirleyici.'}
    </span></div>`;

  return `
    <div class="modal-bar"></div>
    <div class="modal-ust">
      <div>
        <div class="modal-coin">${sym}</div>
        <div class="modal-fiyat">$${fmt(s.lastClose)}</div>
      </div>
      <div class="modal-rozet" style="background:${r}">${etiket(s.score)}</div>
    </div>
    ${s.isHighPotential?`<div class="firsat-bant" style="margin:0 20px;border-radius:8px;padding:8px">🔥 YÜKSEK POTANSİYEL · Max +%${s.atr&&s.atr.tp3Pct}</div>`:''}
    ${accBolum('ozet','Özet & Başarı Analizi','📈',ozet,true)}
    ${accBolum('seviye','Alış / Satış Seviyeleri','🎯',seviyeler,false)}
    ${accBolum('teknik','Teknik Göstergeler','📊',teknik,false)}
    ${accBolum('whale','Whale & Order Book','🐋',wf,false)}
    ${accBolum('duyarlilik','Piyasa Duyarlılığı','🧠',duyarlilik,false)}
    <div class="kapat-btn" onclick="document.getElementById('modal').classList.remove('acik')">Kapat</div>`;
}

function piyasaYorumu(s) {
  const y = [];
  if (s.rsi < 30) y.push('RSI aşırı satım bölgesinde — güçlü geri dönüş sinyali.');
  if (s.trend && s.trend.goldenCross) y.push('Golden Cross oluştu — uzun vadeli yükseliş başlangıcı olabilir.');
  if (s.mtfKonfirm) y.push('4 saatlik grafik de AL diyor — çok güçlü konfirmasyon.');
  if (s.volume && s.volume.isHigh) y.push('Hacim ' + s.volume.ratio + 'x ortalamanın üzerinde — hareket güçlü.');
  if (s.fibonacci && s.fibonacci.atSupport) y.push('Fibonacci destek seviyesinde — geri dönüş olasılığı yüksek.');
  if (s.whale && s.whale.whaleBullish) y.push('Balina alımları tespit edildi — kurumsal ilgi var.');
  if (s.orderBook && s.orderBook.bullish) y.push('Order book alım ağırlıklı — kısa vadede yükseliş baskısı.');
  if (s.funding && s.funding.isVeryNegative) y.push('Funding rate negatif — short pozisyonlar sıkışmış, yükseliş kapıda.');
  if (s.sentiment && s.sentiment.isExtremeFear) y.push('Korku endeksi çok düşük — tarihsel dip bölgesi.');
  if (s.isHighPotential) y.push('Yüksek potansiyel fırsat — TP3\'e kadar %' + (s.atr&&s.atr.tp3Pct) + ' getiri hedefleniyor.');
  if (y.length === 0) y.push('Teknik göstergeler alım yönünde sinyal veriyor.');
  return y;
}

function raporHTML() {
  const guclu = sinyaller.filter(s => s.score >= 4).length;
  const firsat = sinyaller.filter(s => s.isHighPotential).length;
  const mtf = sinyaller.filter(s => s.mtfKonfirm).length;
  const whale = sinyaller.filter(s => s.whale && s.whale.whaleBullish).length;
  const ortB = sinyaller.length > 0 ? Math.round(sinyaller.reduce((t,s)=>t+basari(s),0)/sinyaller.length) : 0;
  const enIyi = sinyaller.filter(s => s.mtfKonfirm || s.isHighPotential || s.score >= 5).slice(0,10);

  return `<div class="rapor-wrap">
    <div class="rapor-baslik">Piyasa Raporu</div>
    <div class="rapor-zaman">${document.getElementById('guncelleme').textContent}</div>
    <div class="rapor-grid">
      <div class="rapor-kutu"><div class="rapor-sayi">${sinyaller.length}</div><div class="rapor-etiket">Toplam AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#00FF88">${guclu}</div><div class="rapor-etiket">Güçlü AL</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#FFD700">${firsat}</div><div class="rapor-etiket">Fırsat</div></div>
      <div class="rapor-kutu"><div class="rapor-sayi" style="color:#8B5CF6">${whale}</div><div class="rapor-etiket">Whale</div></div>
    </div>
    <div style="font-size:14px;font-weight:700;color:#C9D1D9;margin-bottom:10px">En İyi Fırsatlar</div>
    ${enIyi.length === 0 ? '<div class="bos">Şu an güçlü fırsat yok</div>' :
      enIyi.map((s,i) => `
        <div class="rapor-satir" onclick="modalAc(${s._idx})">
          <div>
            <div class="rapor-coin">${s.symbol.replace('USDT','')}</div>
            <div class="rapor-alt">${s.mtfKonfirm?'✓ MTF':''}${s.whale&&s.whale.whaleBullish?' 🐋':''}${s.isHighPotential?' 🔥':''}</div>
          </div>
          <div class="rapor-sag">
            <div class="rapor-yuzde" style="color:${renk(s.score)}">%${basari(s)}</div>
            <div class="rapor-sure">${sure(s)}</div>
            ${s.atr&&s.atr.tp3Pct>0?`<div class="rapor-hedef">Max +%${s.atr.tp3Pct}</div>`:''}
          </div>
        </div>`).join('')}
  </div>`;
}

function render() {
  const el = document.getElementById('icerik');
  const l = liste();
  if (aktifFiltre === 'rapor') { el.innerHTML = raporHTML(); return; }
  if (l.length === 0) { el.innerHTML = '<div class="bos">Bu filtre için sinyal yok</div>'; return; }
  l.forEach((s,i) => s._idx = sinyaller.indexOf(s));
  el.innerHTML = l.map((s,i) => kartHTML(s, s._idx)).join('') + '<div style="height:40px"></div>';
}

function filtreSec(f, btn) {
  aktifFiltre = f;
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
  btn.classList.add('aktif');
  render();
}

function modalAc(idx) {
  const s = sinyaller[idx];
  if (!s) return;
  document.getElementById('modal-icerik').innerHTML = modalHTML(s);
  document.getElementById('modal').classList.add('acik');
  document.getElementById('modal-icerik').scrollTop = 0;
}

function modalKapat(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('acik');
}

function accToggle(id) {
  const icerik = document.getElementById('acc-' + id);
  const ikon   = document.getElementById('ikon-' + id);
  icerik.classList.toggle('acik');
  ikon.classList.toggle('acik');
}

sinyalCek();
zamanlayici = setInterval(sinyalCek, 60000);
</script>
</body>
