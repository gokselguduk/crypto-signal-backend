<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0E17" id="theme-color-meta">
<title>Sunday/Sunny</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0E17;color:#E6EDF3;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;overflow-x:hidden}
:root{
  --bg1:#0A0E17;--bg2:#0D1117;--bg3:#161B22;--bg4:#21262D;
  --t1:#E6EDF3;--t2:#8B949E;--t3:#484F58;
  --green:#3FB950;--green2:#00FF88;--red:#F85149;--blue:#58A6FF;
  --amber:#FFD700;--purple:#8B5CF6;--orange:#FF6B35;
  --border:#21262D;
}

/* ── HEADER ─────────────────────────────────── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,14,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-sun{width:28px;height:28px}
.logo-txt{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header-sag{display:flex;align-items:center;gap:10px}
.tarama-badge{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);color:var(--t2)}
.tarama-badge.canli{border-color:var(--green);color:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── NAV TABS ────────────────────────────────── */
.nav{display:flex;gap:4px;padding-bottom:1px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:6px 14px;border-radius:8px 8px 0 0;font-size:12px;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;position:relative;transition:all 0.2s}
.nav-btn.aktif{color:var(--t1);background:var(--bg3)}
.nav-btn.aktif::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blue);border-radius:2px}
.nav-sayac{display:inline-block;background:var(--bg4);color:var(--t2);border-radius:6px;padding:1px 5px;font-size:10px;margin-left:4px}
.nav-sayac.yesil{background:#0d1f0d;color:var(--green)}

/* ── İÇERİK ─────────────────────────────────── */
.icerik{padding-top:100px;padding-bottom:80px;min-height:100vh}

/* ── BOTTOM NAV ──────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(13,17,23,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;background:none;border:none;cursor:pointer;color:var(--t3);transition:color 0.2s}
.bn-btn.aktif{color:var(--blue)}
.bn-ikon{font-size:20px;line-height:1}
.bn-txt{font-size:10px;font-weight:500}

/* ── DASHBOARD ───────────────────────────────── */
.dashboard{padding:12px}
.piyasa-kart{background:var(--bg3);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.piyasa-kart-ust{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.piyasa-kart-baslik{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.piyasa-kart-deger{font-size:28px;font-weight:700;letter-spacing:-1px}
.piyasa-kart-alt{font-size:12px;color:var(--t2);margin-top:2px}
.durum-rozet{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600}

.ozet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.ozet-kutu{background:var(--bg2);border-radius:12px;padding:10px;text-align:center}
.ozet-kutu-sayi{font-size:20px;font-weight:700;margin-bottom:2px}
.ozet-kutu-txt{font-size:10px;color:var(--t2)}

.katman-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.katman-kutu{background:var(--bg2);border-radius:12px;padding:12px;border:1px solid var(--border)}
.katman-kutu-baslik{font-size:10px;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px}
.katman-kutu-deger{font-size:14px;font-weight:600}
.katman-kutu-alt{font-size:11px;color:var(--t2);margin-top:2px}

/* ── SİNYAL KARTLARI ─────────────────────────── */
.sinyaller{padding:12px}
.filtre-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filtre-bar::-webkit-scrollbar{display:none}
.filtre-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all 0.2s}
.filtre-btn.aktif{background:var(--blue);border-color:var(--blue);color:#fff}

.arama-wrap{position:relative;margin-bottom:12px}
.arama-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 36px 10px 12px;font-size:14px;color:var(--t1);outline:none}
.arama-input:focus{border-color:var(--blue)}
.arama-temizle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);font-size:16px;cursor:pointer;display:none}

.kart{background:var(--bg3);border-radius:16px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.15s;active:opacity(0.8)}
.kart:active{transform:scale(0.98)}
.kart.a-kalite{border-color:#3a6b3a}
.kart.b-kalite{border-color:#2d4a6b}
.kart-ust{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.kart-sol{flex:1}
.kart-coin-satir{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.kart-coin-adi{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.kart-favori{background:none;border:none;font-size:18px;cursor:pointer;color:var(--t3);padding:0}
.kart-favori.aktif{color:var(--amber)}
.kart-badges{display:flex;gap:4px;flex-wrap:wrap}
.rozet{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600}
.rozet-green{background:#0d1f0d;color:var(--green);border:1px solid #1a3d1a}
.rozet-blue{background:#0d1a2d;color:var(--blue);border:1px solid #1a2d4a}
.rozet-purple{background:#1a0d2d;color:var(--purple);border:1px solid #2d1a4a}
.rozet-amber{background:#1a1500;color:var(--amber);border:1px solid #3d3000}
.rozet-orange{background:#1a0d00;color:var(--orange);border:1px solid #3d2200}

.kart-sag{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.guven-daire{width:60px;height:60px;border-radius:50%;border:2.5px solid;display:flex;flex-direction:column;align-items:center;justify-content:center}
.guven-sayi{font-size:16px;font-weight:700;line-height:1}
.guven-alt{font-size:8px;color:var(--t2)}
.rr-badge{font-size:11px;font-weight:600;color:var(--amber)}

.kart-fiyat{padding:0 14px 10px;display:flex;align-items:center;gap:8px}
.fiyat-alis{font-size:16px;font-weight:600;color:var(--t1)}
.fiyat-anlik{font-size:14px;font-weight:600}
.fiyat-fark{font-size:12px;padding:2px 6px;border-radius:6px;font-weight:600}

.hedef-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 14px 12px}
.hedef-kutu{background:var(--bg2);border-radius:8px;padding:8px;text-align:center}
.hedef-etiket{font-size:9px;color:var(--t2);margin-bottom:2px;text-transform:uppercase}
.hedef-pct{font-size:13px;font-weight:700}
.hedef-fiyat{font-size:10px;color:var(--t2);margin-top:1px}

.ind-bar{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;scrollbar-width:none}
.ind-bar::-webkit-scrollbar{display:none}
.ind-kutu{flex-shrink:0;background:var(--bg2);border-radius:8px;padding:6px 10px;text-align:center;min-width:52px}
.ind-etiket{font-size:9px;color:var(--t2);margin-bottom:2px}
.ind-deger{font-size:13px;font-weight:600}

/* ── MODAL ───────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:none;align-items:flex-end}
.modal-overlay.acik{display:flex}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.modal-bar{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto}
.modal-header{padding:0 20px 16px;border-bottom:1px solid var(--border)}
.modal-coin{font-size:28px;font-weight:700;letter-spacing:-1px}
.modal-fiyat-satir{display:flex;align-items:center;gap:10px;margin-top:4px}
.modal-fiyat{font-size:20px;font-weight:600;color:var(--t1)}
.modal-degisim{font-size:14px;font-weight:600;padding:3px 8px;border-radius:8px}

.modal-bolum{padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-bolum-baslik{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.modal-bolum-ikon{font-size:14px}

.modal-ozet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.modal-ozet-kutu{background:var(--bg3);border-radius:12px;padding:12px;text-align:center}
.modal-ozet-sayi{font-size:22px;font-weight:700;margin-bottom:2px}
.modal-ozet-alt{font-size:10px;color:var(--t2)}

.seviye-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.seviye-kutu{background:var(--bg3);border-radius:12px;padding:12px;border-left:3px solid var(--border)}
.seviye-etiket{font-size:10px;color:var(--t2);margin-bottom:4px;text-transform:uppercase}
.seviye-deger{font-size:18px;font-weight:700}
.seviye-pct{font-size:12px;margin-top:2px}

.teknik-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.teknik-kutu{background:var(--bg3);border-radius:12px;padding:10px;text-align:center}
.teknik-etiket{font-size:9px;color:var(--t2);margin-bottom:4px;text-transform:uppercase}
.teknik-deger{font-size:16px;font-weight:700;margin-bottom:2px}
.teknik-alt{font-size:10px;color:var(--t2)}

.katman-detay{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.katman-detay-kutu{background:var(--bg3);border-radius:12px;padding:12px}
.katman-detay-baslik{font-size:10px;color:var(--t2);margin-bottom:6px;text-transform:uppercase}
.katman-detay-deger{font-size:14px;font-weight:600;margin-bottom:3px}
.katman-detay-alt{font-size:11px;color:var(--t2)}

.yorum-listesi{margin-top:10px}
.yorum-satir{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.yorum-satir:last-child{border:none}
.yorum-ok{color:var(--green);font-size:12px;flex-shrink:0;margin-top:2px}
.yorum-txt{font-size:13px;color:var(--t1);line-height:1.5}

.modal-kapat{width:calc(100% - 40px);margin:16px 20px;padding:14px;background:var(--bg4);border:none;border-radius:14px;color:var(--t1);font-size:15px;font-weight:600;cursor:pointer}

/* ── PORTFÖY ─────────────────────────────────── */
.portfolio{padding:12px}
.portfoy-bos{text-align:center;padding:60px 20px;color:var(--t2)}
.portfoy-bos-ikon{font-size:48px;margin-bottom:12px}
.portfoy-ekle-btn{width:100%;padding:14px;background:var(--blue);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
.portfoy-ozet{background:var(--bg3);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.portfoy-ozet-baslik{font-size:11px;color:var(--t2);margin-bottom:4px}
.portfoy-ozet-deger{font-size:32px;font-weight:700;letter-spacing:-1px}
.portfoy-ozet-degisim{font-size:14px;font-weight:600;margin-top:4px}
.portfoy-pozisyon{background:var(--bg3);border-radius:16px;padding:14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.poz-sol{display:flex;align-items:center;gap:12px}
.poz-coin{font-size:18px;font-weight:700}
.poz-miktar{font-size:12px;color:var(--t2);margin-top:2px}
.poz-sag{text-align:right}
.poz-deger{font-size:16px;font-weight:600}
.poz-kar{font-size:13px;font-weight:600;margin-top:2px}

/* ── PORTFÖY EKLE MODAL ──────────────────────── */
.portfoy-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.8);display:none;align-items:flex-end}
.portfoy-modal.acik{display:flex}
.portfoy-modal-icerik{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.portfoy-modal-baslik{font-size:18px;font-weight:700;margin-bottom:16px}
.form-etiket{font-size:12px;color:var(--t2);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;color:var(--t1);outline:none;margin-bottom:12px}
.form-input:focus{border-color:var(--blue)}
.form-butonlar{display:flex;gap:8px;margin-top:4px}
.form-btn-iptal{flex:1;padding:14px;background:var(--bg4);border:none;border-radius:14px;color:var(--t1);font-size:15px;font-weight:600;cursor:pointer}
.form-btn-kaydet{flex:1;padding:14px;background:var(--blue);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}

/* ── LOADING & BOŞ ───────────────────────────── */
.yukleme{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--t2);font-size:14px}
.spinner{width:32px;height:32px;border:2px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bos{text-align:center;padding:60px 20px;color:var(--t2);font-size:14px}

/* ── SCROLL TOP ──────────────────────────────── */
.scroll-top{position:fixed;bottom:90px;right:16px;width:40px;height:40px;background:var(--bg3);border:1px solid var(--border);border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:50}
.scroll-top.gorunu{display:flex}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <svg class="logo-sun" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="6" id="sun-core" fill="#58A6FF"/>
        <g id="sun-rays" stroke="#58A6FF" stroke-width="2" stroke-linecap="round">
          <line x1="14" y1="2" x2="14" y2="5"/>
          <line x1="14" y1="23" x2="14" y2="26"/>
          <line x1="2" y1="14" x2="5" y2="14"/>
          <line x1="23" y1="14" x2="26" y2="14"/>
          <line x1="5.5" y1="5.5" x2="7.5" y2="7.5"/>
          <line x1="20.5" y1="20.5" x2="22.5" y2="22.5"/>
          <line x1="22.5" y1="5.5" x2="20.5" y2="7.5"/>
          <line x1="7.5" y1="20.5" x2="5.5" y2="22.5"/>
        </g>
      </svg>
      <span class="logo-txt" id="logo-txt" style="color:#58A6FF">Sunday</span>
    </div>
    <div class="header-sag">
      <span class="tarama-badge" id="tarama-badge">Bekleniyor</span>
      <span style="font-size:11px;color:var(--t2)" id="guncelleme"></span>
    </div>
  </div>
  <div class="nav" id="nav">
    <button class="nav-btn aktif" onclick="sayfaSec('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="sayfaSec('sinyaller',this)">Sinyaller <span class="nav-sayac yesil" id="sinyal-sayac">0</span></button>
    <button class="nav-btn" onclick="sayfaSec('portfoy',this)">Portföy</button>
    <button class="nav-btn" onclick="sayfaSec('rapor',this)">Rapor</button>
  </div>
</div>

<!-- İÇERİK -->
<div class="icerik" id="icerik">
  <div class="yukleme"><div class="spinner"></div><div>Piyasa verisi yükleniyor...</div></div>
</div>

<!-- SCROLL TOP -->
<div class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<!-- SİNYAL MODAL -->
<div class="modal-overlay" id="modal" onclick="modalDis(event)">
  <div class="modal" id="modal-icerik"></div>
</div>

<!-- PORTFÖY EKLE MODAL -->
<div class="portfoy-modal" id="portfoy-modal">
  <div class="portfoy-modal-icerik">
    <div class="portfoy-modal-baslik">Pozisyon Ekle</div>
    <label class="form-etiket">Coin (örn: BTC)</label>
    <input class="form-input" id="poz-coin-input" placeholder="BTCUSDT" style="text-transform:uppercase">

    <input class="form-input" id="poz-fiyat-input" type="number" placeholder="0.00">
    <label class="form-etiket">Miktar</label>
    <input class="form-input" id="poz-miktar-input" type="number" placeholder="0.00">
    <div class="form-butonlar">
      <button class="form-btn-iptal" onclick="portfoyModalKapat()">İptal</button>
      <button class="form-btn-kaydet" onclick="portfoyEkle()">Ekle</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let sinyaller = [];
let anlikFiyatlar = {};
let favoriler = JSON.parse(localStorage.getItem('s_fav')||'[]');
let portfoy = JSON.parse(localStorage.getItem('s_portfoy')||'[]');
let aktifSayfa = 'dashboard';
let aktifFiltre = 'tum';
let aramaMetni = '';
let piyasaDurum = null;

// ── YARDIMCI ─────────────────────────────────────────────
function fmt(v) {
  if (!v && v !== 0) return '—';
  if (v >= 10000) return v.toLocaleString('tr-TR', {maximumFractionDigits:0});
  if (v >= 1)     return v.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:4});
  return v.toLocaleString('tr-TR', {minimumFractionDigits:4, maximumFractionDigits:8});
}

function guvenPct(s) {
  const base = Math.min(s.score * 8, 60);
  let bonus = 0;
  if (s.mtfKonfirm) bonus += 12;
  if (s.whale && s.whale.whaleBullish) bonus += 8;
  if (s.orderBook && s.orderBook.bullish) bonus += 6;
  if (s.funding && s.funding.isNegative) bonus += 5;
  if (s.mtfDetay && s.mtfDetay.allAligned) bonus += 10;
  if (s.orderFlow && s.orderFlow.score > 2) bonus += 8;
  if (s.smartMoney && s.smartMoney.isShortSqueeze) bonus += 6;
  if (s.quality && s.quality.grade === 'A') bonus += 8;
  if (s.quality && s.quality.grade === 'B') bonus += 4;
  return Math.min(Math.round(base + bonus), 97);
}

function maxKazanc(s) { return s.atr ? (s.atr.tp3Pct || 0) : 0; }

function skorRenk(score) {
  if (score >= 8) return '#00FF88';
  if (score >= 5) return '#3FB950';
  if (score >= 3) return '#58A6FF';
  return '#8B949E';
}

function kaliteRenk(grade) {
  const m = {A:'#00FF88',B:'#3FB950',C:'#58A6FF',D:'#8B949E'};
  return m[grade] || '#8B949E';
}

function rejimiTr(r) {
  const m = {TREND:'Trend',RANGE:'Yatay',BREAKOUT:'Kırılım',UNKNOWN:'Bilinmiyor'};
  return m[r] || r || '—';
}

function duygusalDurumTr(s) {
  const m = {EXTREME_PANIC:'Aşırı Panik',PANIC:'Panik',NEUTRAL:'Nötr',GREED:'Hırs',EXTREME_GREED:'Aşırı Hırs'};
  return m[s] || s || '—';
}

// ── VERİ ÇEK ─────────────────────────────────────────────
function sinyalCek() {
  fetch(BASE + '/api/scan/latest')
    .then(r => r.json())
    .then(d => {
      sinyaller = (d.signals || []).map((s, i) => ({...s, _idx: i}));
      document.getElementById('sinyal-sayac').textContent = sinyaller.length;
      document.getElementById('tarama-badge').textContent = sinyaller.length + ' sinyal';
      document.getElementById('tarama-badge').className = 'tarama-badge' + (sinyaller.length > 0 ? ' canli' : '');
      const now = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
      document.getElementById('guncelleme').textContent = now;
      anlikFiyatGuncelle();
      render();
    })
    .catch(() => {});
}

function anlikFiyatGuncelle() {
  if (!sinyaller.length) return;
  const symbols = sinyaller.slice(0, 20).map(s => s.symbol);
  symbols.forEach(sym => {
    fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${sym}`)
      .then(r => r.json())
      .then(d => { if (d.price) { anlikFiyatlar[sym] = parseFloat(d.price); } })
      .catch(() => {});
  });
}

  aktifSayfa = sayfa;

function filtreliSinyaller() {
  let liste = [...sinyaller];
  if (aktifFiltre === 'favori')  liste = liste.filter(s => favoriler.includes(s.symbol));
  if (aktifFiltre === 'a-kalite') liste = liste.filter(s => s.quality && s.quality.grade === 'A');

  if (aktifFiltre === 'aligned')  liste = liste.filter(s => s.mtfDetay && s.mtfDetay.allAligned);

        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">Order Flow (K1)</div>
          <div class="katman-detay-deger" style="color:${s.orderFlow&&s.orderFlow.score>0?'var(--green)':'var(--t2)'}">
            ${s.orderFlow ? (s.orderFlow.score > 0 ? '+' : '') + s.orderFlow.score + ' puan' : '—'}
          </div>
          <div class="katman-detay-alt">${s.orderFlow&&s.orderFlow.cvd ? 'Delta: ' + s.orderFlow.cvd.deltaRatio : '—'}</div>
        </div>
        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">MTF Confluence (K2)</div>
          <div class="katman-detay-deger" style="color:${s.mtfDetay&&s.mtfDetay.allAligned?'var(--green2)':'var(--green)'}">
            ${s.mtfDetay&&s.mtfDetay.allAligned ? '4 TF Hizalı ⚡' : s.mtfKonfirm ? 'Onaylı' : 'Kısmi'}
          </div>
          <div class="katman-detay-alt">
            ${s.mtfDetay ? [s.mtfDetay.dir15m>0?'15m✓':'',s.mtfDetay.dir1h>0?'1h✓':'',s.mtfDetay.dir4h>0?'4h✓':'',s.mtfDetay.dir1d>0?'1d✓':''].filter(Boolean).join(' ') : '—'}
          </div>
        </div>
        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">Piyasa Rejimi (K3)</div>
          <div class="katman-detay-deger" style="color:${s.regime&&s.regime.type==='BREAKOUT'?'var(--green2)':s.regime&&s.regime.type==='TREND'?'var(--green)':'var(--t2)'}">
            ${s.regime ? rejimiTr(s.regime.type) : '—'}
          </div>
          <div class="katman-detay-alt">ADX: ${s.regime&&s.regime.adx||'—'}</div>
        </div>
        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">Sinyal Kalitesi (K4)</div>
          <div class="katman-detay-deger" style="color:${gRenk}">${grade} Kalite</div>
          <div class="katman-detay-alt">Confluence: %${s.quality&&s.quality.confluenceScore||'—'}</div>
        </div>
        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">Smart Money (K5)</div>
          <div class="katman-detay-deger" style="color:${s.smartMoney&&s.smartMoney.isShortSqueeze?'var(--orange)':'var(--t2)'}">
            ${s.smartMoney && s.smartMoney.isShortSqueeze ? '🔥 Sıkışma' : s.smartMoney ? 'OI: ' + s.smartMoney.oiTrend : '—'}
          </div>
          <div class="katman-detay-alt">${s.smartMoney ? 'L/S: ' + (s.smartMoney.lsSentiment||'—') : '—'}</div>
        </div>
        <div class="katman-detay-kutu">
          <div class="katman-detay-baslik">Psikoloji (K6)</div>
          <div class="katman-detay-deger" style="color:${s.psychology&&s.psychology.isStopHunt?'var(--purple)':s.psychology&&s.psychology.isSilent?'var(--amber)':'var(--t2)'}">
            ${s.psychology ? (s.psychology.isStopHunt ? '🎯 Stop Avı' : s.psychology.isSilent ? '🤫 Sessizlik' : duygusalDurumTr(s.psychology.emotionalState)) : '—'}
          </div>
          <div class="katman-detay-alt">${s.psychology ? 'Skor: ' + (s.psychology.score||0) : '—'}</div>
        </div>
      </div>
    </div>

    <!-- Teknik -->
    <div class="modal-bolum">
      <div class="modal-bolum-baslik"><span class="modal-bolum-ikon">📊</span>Teknik Göstergeler</div>
      <div class="teknik-grid">
        <div class="teknik-kutu">
          <div class="teknik-etiket">RSI</div>
          <div class="teknik-deger" style="color:${s.rsi<35?'#00FF88':s.rsi>70?'#F85149':'var(--t1)'}">${s.rsi||'—'}</div>
          <div class="teknik-alt">${s.rsi<35?'Aşırı Satım':s.rsi>70?'Aşırı Alım':'Normal'}</div>
        </div>
        <div class="teknik-kutu">
          <div class="teknik-etiket">Stoch RSI</div>
          <div class="teknik-deger" style="color:${s.stochRSI&&s.stochRSI.k<20?'#00FF88':s.stochRSI&&s.stochRSI.k>80?'#F85149':'var(--t1)'}">${s.stochRSI&&s.stochRSI.k||'—'}</div>
          <div class="teknik-alt">${s.stochRSI&&s.stochRSI.k<20?'Aşırı Satım':s.stochRSI&&s.stochRSI.k>80?'Aşırı Alım':'Normal'}</div>
        </div>
        <div class="teknik-kutu">
          <div class="teknik-etiket">Hacim</div>
          <div class="teknik-deger" style="color:${s.volume&&s.volume.isHigh?'#00FF88':'var(--t2)'}">${s.volume?s.volume.ratio+'x':'—'}</div>
          <div class="teknik-alt">${s.volume&&s.volume.isHigh?'Yüksek':'Normal'}</div>
        </div>
        <div class="teknik-kutu">
          <div class="teknik-etiket">Trend</div>
          <div class="teknik-deger" style="font-size:11px;color:${s.trend&&s.trend.strength>0?'#3FB950':'#F85149'}">${s.trend&&s.trend.trend||'—'}</div>
          <div class="teknik-alt">EMA Trendi</div>
        </div>
        <div class="teknik-kutu">
          <div class="teknik-etiket">Fib Destek</div>
          <div class="teknik-deger" style="color:${s.fibonacci&&s.fibonacci.atSupport?'#00FF88':'var(--t2)'}">${s.fibonacci&&s.fibonacci.atSupport?'Evet':'Hayır'}</div>
          <div class="teknik-alt">Seviyede mi</div>
        </div>
        <div class="teknik-kutu">
          <div class="teknik-etiket">Golden X</div>
          <div class="teknik-deger" style="color:${s.trend&&s.trend.goldenCross?'#FFD700':'var(--t2)'}">${s.trend&&s.trend.goldenCross?'Evet':'Hayır'}</div>
          <div class="teknik-alt">EMA Kesişim</div>
        </div>
      </div>
    </div>

    <button class="modal-kapat" onclick="modalKapat()">Kapat</button>
  `;
  document.getElementById('modal').classList.add('acik');
  document.getElementById('modal-icerik').scrollTop = 0;
}

function modalDis(e) { if (e.target === document.getElementById('modal')) modalKapat(); }
function modalKapat() { document.getElementById('modal').classList.remove('acik'); }

// ── PORTFÖY ──────────────────────────────────────────────
function portfoyHTML() {
  if (portfoy.length === 0) {
    return `<div class="portfolio">
      <div class="portfoy-bos">
        <div class="portfoy-bos-ikon">📊</div>
        <div style="font-size:16px;font-weight:600;color:var(--t1);margin-bottom:8px">Portföy Boş</div>
        <div style="font-size:13px">Alış yaptığın coinleri ekleyerek takip et</div>
        <button class="portfoy-ekle-btn" onclick="portfoyModalAc()">+ Pozisyon Ekle</button>
      </div>
    </div>`;
  }

  let toplamDeger = 0;
  let toplamMaliyet = 0;

  const pozisyonlar = portfoy.map(poz => {
    const anlik = anlikFiyatlar[poz.symbol] || poz.alis;
    const deger = anlik * poz.miktar;
    const maliyet = poz.alis * poz.miktar;
    const kar = deger - maliyet;
    const karPct = (kar / maliyet * 100);
    toplamDeger += deger;
    toplamMaliyet += maliyet;
    return {...poz, anlik, deger, kar, karPct};
  });

  const toplamKar = toplamDeger - toplamMaliyet;
  const toplamKarPct = toplamMaliyet > 0 ? (toplamKar / toplamMaliyet * 100) : 0;

  return `<div class="portfolio">
    <div class="portfoy-ozet">
      <div class="portfoy-ozet-baslik">Toplam Portföy Değeri</div>
      <div class="portfoy-ozet-deger">$${fmt(toplamDeger)}</div>
      <div class="portfoy-ozet-degisim" style="color:${toplamKar>=0?'var(--green)':'var(--red)'}">
        ${toplamKar>=0?'+':''}$${fmt(Math.abs(toplamKar))} (${toplamKar>=0?'+':''}${toplamKarPct.toFixed(2)}%)
      </div>
    </div>
    ${pozisyonlar.map(poz => `
      <div class="portfoy-pozisyon">
        <div class="poz-sol">
          <div style="width:40px;height:40px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue)">${poz.symbol.replace('USDT','').slice(0,3)}</div>
          <div>
            <div class="poz-coin">${poz.symbol.replace('USDT','')}</div>
            <div class="poz-miktar">${poz.miktar} adet · Alış: $${fmt(poz.alis)}</div>
          </div>
        </div>
        <div class="poz-sag">
          <div class="poz-deger">$${fmt(poz.deger)}</div>
          <div class="poz-kar" style="color:${poz.kar>=0?'var(--green)':'var(--red)'}">
            ${poz.kar>=0?'+':''}${poz.karPct.toFixed(2)}%
          </div>
        </div>
      </div>
    `).join('')}
    <button class="portfoy-ekle-btn" onclick="portfoyModalAc()">+ Pozisyon Ekle</button>
    <div style="height:20px"></div>
  </div>`;
}

function portfoyModalAc() { document.getElementById('portfoy-modal').classList.add('acik'); }
function portfoyModalKapat() { document.getElementById('portfoy-modal').classList.remove('acik'); }

function portfoyEkle() {
  const coin   = document.getElementById('poz-coin-input').value.trim().toUpperCase();
  const fiyat  = parseFloat(document.getElementById('poz-fiyat-input').value);
  const miktar = parseFloat(document.getElementById('poz-miktar-input').value);
  if (!coin || !fiyat || !miktar) return;
  const symbol = coin.endsWith('USDT') ? coin : coin + 'USDT';
  portfoy.push({symbol, alis: fiyat, miktar});
  localStorage.setItem('s_portfoy', JSON.stringify(portfoy));
  portfoyModalKapat();
  document.getElementById('poz-coin-input').value = '';
  document.getElementById('poz-fiyat-input').value = '';
  document.getElementById('poz-miktar-input').value = '';
  anlikFiyatGuncelle();
  render();
}

// ── RAPOR ─────────────────────────────────────────────────
function raporHTML() {
  const toplam   = sinyaller.length;
  const gradeA   = sinyaller.filter(s => s.quality && s.quality.grade === 'A').length;
  const gradeB   = sinyaller.filter(s => s.quality && s.quality.grade === 'B').length;
  const gradeC   = sinyaller.filter(s => s.quality && s.quality.grade === 'C').length;
  const aligned  = sinyaller.filter(s => s.mtfDetay && s.mtfDetay.allAligned).length;
  const squeeze  = sinyaller.filter(s => s.smartMoney && s.smartMoney.isShortSqueeze).length;
  const stopAvi  = sinyaller.filter(s => s.psychology && s.psychology.isStopHunt).length;
  const sessiz   = sinyaller.filter(s => s.psychology && s.psychology.isSilent).length;
  const whale    = sinyaller.filter(s => s.whale && s.whale.whaleBullish).length;
  const ortGuven = toplam > 0 ? Math.round(sinyaller.reduce((t, s) => t + guvenPct(s), 0) / toplam) : 0;
  const ortKazanc = toplam > 0 ? parseFloat((sinyaller.reduce((t, s) => t + maxKazanc(s), 0) / toplam).toFixed(1)) : 0;

  return `<div style="padding:12px">
    <div style="background:var(--bg3);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">
      <div style="font-size:12px;color:var(--t2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px">Sistem Performansı</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
        ${[
          {lbl:'Ort. Güven', val:'%'+ortGuven, renk:'var(--blue)'},
          {lbl:'Ort. Max Kazanç', val:'%'+ortKazanc, renk:'var(--amber)'},
          {lbl:'A Kalite', val:gradeA, renk:'#00FF88'},
          {lbl:'B Kalite', val:gradeB, renk:'var(--green)'},
          {lbl:'4 TF Hizalı', val:aligned, renk:'var(--blue)'},
          {lbl:'Short Sıkışma', val:squeeze, renk:'var(--orange)'},
          {lbl:'Stop Avı', val:stopAvi, renk:'var(--purple)'},
          {lbl:'Sessizlik', val:sessiz, renk:'var(--amber)'},
          {lbl:'Balina Aktif', val:whale, renk:'var(--green)'},
          {lbl:'Toplam Sinyal', val:toplam, renk:'var(--t1)'},
        ].map(x => `
          <div style="background:var(--bg2);border-radius:12px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:${x.renk}">${x.val}</div>
            <div style="font-size:11px;color:var(--t2);margin-top:2px">${x.lbl}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="height:20px"></div>
  </div>`;
}

// ── DİĞER ────────────────────────────────────────────────
function favoriToggle(e, symbol) {
  e.stopPropagation();
  const idx = favoriler.indexOf(symbol);
  if (idx === -1) favoriler.push(symbol);
  else favoriler.splice(idx, 1);
  localStorage.setItem('s_fav', JSON.stringify(favoriler));
  render();
}

function filtreySec(filtre) {
  aktifFiltre = filtre;
  render();
}

function aramaYap(v) {
  aramaMetni = v.trim();
  render();
}

function aramaTemizle() {
  aramaMetni = '';
  render();
}

// Scroll top butonu
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  if (btn) btn.classList.toggle('gorunu', window.scrollY > 300);
});

// ── BAŞLAT ────────────────────────────────────────────────
sinyalCek();
setInterval(sinyalCek, 60000);
setInterval(anlikFiyatGuncelle, 30000);
</script>
</body>
</html>
