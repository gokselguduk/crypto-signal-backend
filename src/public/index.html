<body>

<div class="sticky-top">
  <div class="piyasa-durum" id="piyasa-durum">
    <div class="app-adi" id="app-adi" style="color:#58A6FF">SUNDAY</div>
    <svg width="52" height="52" viewBox="0 0 64 64" id="sun-svg"></svg>
    <div class="piyasa-etiket" id="piyasa-etiket" style="color:#58A6FF">Analiz ediliyor...</div>
    <div class="piyasa-alt" id="piyasa-alt">Piyasa durumu hesaplanıyor</div>
  </div>
  <div class="ust-bilgi">
    <div class="guncelleme" id="guncelleme">Yükleniyor...</div>
    <div class="fg-badge" id="fg-badge"><span id="fg-emoji">😐</span><span id="fg-val" style="color:#8B949E">--</span></div>
  </div>
  <div class="tab-bar">
    <div class="tab-btn aktif"    onclick="tabSec('tumu',this)"><span class="tab-ikon">📋</span><span class="tab-yazi">Tüm Coinler</span></div>
    <div class="tab-btn t-kazanc" onclick="tabSec('kazanc',this)"><span class="tab-ikon">💰</span><span class="tab-yazi">Yüksek Kazanç</span></div>
    <div class="tab-btn t-guven"  onclick="tabSec('guven',this)"><span class="tab-ikon">🛡️</span><span class="tab-yazi">Yüksek Güven</span></div>
    <div class="tab-btn t-balina" onclick="tabSec('balina',this)"><span class="tab-ikon">🐋</span><span class="tab-yazi">Balinalar</span></div>
    <div class="tab-btn t-meme"   onclick="tabSec('meme',this)"><span class="tab-ikon">🚀</span><span class="tab-yazi">Meme</span></div>
    <div class="tab-btn t-rapor"  onclick="tabSec('rapor',this)"><span class="tab-ikon">📊</span><span class="tab-yazi">Rapor</span></div>
    <div class="tab-btn t-gumus"  onclick="tabSec('gumus',this)"><span class="tab-ikon">🥈</span><span class="tab-yazi">Gümüş</span></div>
  </div>
  <div class="siralama-bar" id="siralama-bar">
    <span class="siralama-txt">Sıralama:</span>
    <div class="siralama-secim">
      <button class="siralama-btn aktif" onclick="siralamaySec('guven',this)">Güven</button>
      <button class="siralama-btn" onclick="siralamaySec('kazanc',this)">Kazanç</button>
      <button class="siralama-btn" onclick="siralamaySec('skor',this)">Skor</button>
      <button class="siralama-btn" onclick="siralamaySec('rr',this)">R/R</button>
    </div>
  </div>
</div>

<div id="icerik">
  <div class="yukleme"><div class="spinner"></div><div>Piyasa taranıyor...</div></div>
</div>

<div class="modal-arka" id="modal" onclick="modalKapat(event)">
  <div class="modal-kutu" id="modal-icerik"></div>
</div>

<script>
const BASE = 'https://invigorating-gentleness-production.up.railway.app';
let sinyaller = [], aktifTab = 'tumu', aktifSiralama = 'guven';
let anlikFiyatlar = {};
let oncekiSilverSignal = null;
let oncekiKriptoUyari  = null;

// ===================== SES + TİTREŞİM UYARI =====================
function sesUyari(tip) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (tip === 'guclu') {
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.30);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    } else if (tip === 'normal') {
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else {
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    }
  } catch(e) {}
  if (navigator.vibrate) {
    if (tip === 'guclu')       navigator.vibrate([200,100,200,100,400]);
    else if (tip === 'normal') navigator.vibrate([200,100,200]);
    else                       navigator.vibrate([100]);
  }
}

function uyariGoster(baslik, mesaj, tip) {
  const eski = document.getElementById('uyari-banner');
  if (eski) eski.remove();
  const renk = tip==='guclu'?'#00FF88':tip==='normal'?'#3FB950':'#FFD700';
  const div  = document.createElement('div');
  div.id = 'uyari-banner';
  div.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:999;background:#0D1117;border-bottom:2px solid ${renk};padding:12px 16px;display:flex;justify-content:space-between;align-items:center`;
  div.innerHTML = `
    <div>
      <div style="font-size:13px;font-weight:700;color:${renk}">${baslik}</div>
      <div style="font-size:11px;color:#8B949E;margin-top:2px">${mesaj}</div>
    </div>
    <div onclick="this.parentElement.remove()" style="color:#8B949E;font-size:20px;cursor:pointer;padding:4px 8px">×</div>`;
  document.body.prepend(div);
  sesUyari(tip);
  setTimeout(() => { if (div.parentElement) div.remove(); }, 8000);
}

// ===================== VERİ ÇEKME =====================
async function sinyalCek() {
  try {
    const res  = await fetch(BASE + '/api/scan/latest');
    const data = await res.json();
    sinyaller  = (data.signals || []).filter(s => s.score > 0);
    sinyaller.forEach((s,i) => s._idx = i);
    document.getElementById('guncelleme').textContent =
      new Date().toLocaleTimeString('tr-TR') + ' · ' + sinyaller.length + ' sinyal';
    const fg = sinyaller[0] && sinyaller[0].sentiment;
    if (fg) guncelleFG(fg);
    sunGuncelle(sinyaller, fg);
    anlikFiyatGuncelle();

    // Kripto uyarı kontrolü
    const gucluKripto = sinyaller.filter(s => s.score >= 6 || s.isHighPotential);
    if (gucluKripto.length > 0 && oncekiKriptoUyari !== gucluKripto[0].symbol) {
      oncekiKriptoUyari = gucluKripto[0].symbol;
      const s = gucluKripto[0];
      uyariGoster(
        '🚀 Kripto Fırsat: ' + s.symbol.replace('USDT',''),
        'Skor: +' + s.score + ' · Güven: %' + guvenPct(s) + ' · Max +%' + maxKazanc(s),
        s.score >= 8 ? 'guclu' : 'normal'
      );
    }
    render();
  } catch(e) {
    document.getElementById('guncelleme').textContent = 'Bağlantı hatası';
  }
}

async function anlikFiyatGuncelle() {
  if (sinyaller.length === 0) return;
  const liste = sinyaller.slice(0, 30);
  for (const s of liste) {
    try {
      const r = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=' + s.symbol);
      const d = await r.json();
      if (d.price) anlikFiyatlar[s.symbol] = parseFloat(d.price);
    } catch(e) {}
    await new Promise(r => setTimeout(r, 50));
  }
  if (aktifTab !== 'meme' && aktifTab !== 'rapor' && aktifTab !== 'gumus') render();
}

// ===================== UI FONKSİYONLARI =====================
function guncelleFG(fg) {
  const emoji = fg.isExtremeFear?'😱':fg.isFear?'😨':fg.isExtremeGreed?'🤑':fg.isGreed?'😎':'😐';
  const r = fg.isExtremeFear||fg.isFear?'#F85149':fg.isExtremeGreed||fg.isGreed?'#3FB950':'#8B949E';
  document.getElementById('fg-emoji').textContent = emoji;
  document.getElementById('fg-val').textContent   = fg.value||'--';
  document.getElementById('fg-val').style.color   = r;
  document.getElementById('fg-badge').style.borderColor = r;
}

function sunGuncelle(sins, sentiment) {
  const svg = document.getElementById('sun-svg');
  if (!svg) return;
  const guclu  = sins.filter(s=>s.score>=4).length;
  const firsat = sins.filter(s=>s.isHighPotential).length;
  const toplam = sins.length;
  let mod = toplam===0?'notr':guclu>=15||firsat>=8?'boga_guclu':guclu>=6||firsat>=3?'boga':toplam>=4?'olumlu':'notr';
  if (sentiment&&sentiment.isExtremeFear) mod='korku';
  if (sentiment&&sentiment.isExtremeGreed&&guclu<5) mod='uyari';
  const M={

// ===================== HESAPLAMA FONKSİYONLARI =====================
function basari(s) {
  let b=50+(s.score||0)*7;
  if(s.rsi<35) b+=8; if(s.rsi<25) b+=8;
  if(s.isHighPotential) b+=5; if(s.mtfKonfirm) b+=8;
  if(s.volume&&s.volume.isHigh) b+=4;
  if(s.fibonacci&&s.fibonacci.atSupport) b+=6;
  if(s.orderBook&&s.orderBook.bullish) b+=5;
  if(s.whale&&s.whale.whaleBullish) b+=6;
  if(s.funding&&s.funding.isVeryNegative) b+=5;
  if(s.sentiment&&s.sentiment.isExtremeFear) b+=4;
  return Math.min(Math.max(Math.round(b),35),94);
}

function guvenSkoru(s) {
  let gs=0;
  gs+=Math.round(basari(s)/10);
  gs+=Math.min(s.score||0,10);
  if(s.mtfKonfirm) gs+=10;
  if(s.whale&&s.whale.whaleBullish) gs+=8;
  if(s.funding&&s.funding.isVeryNegative) gs+=8;
  if(s.funding&&s.funding.isNegative) gs+=4;
  if(s.orderBook&&s.orderBook.bullish) gs+=6;
  if(s.orderBook&&s.orderBook.buyWall) gs+=4;
  if(s.fibonacci&&s.fibonacci.atSupport) gs+=5;
  if(s.sentiment&&s.sentiment.isExtremeFear) gs+=5;
  if(s.sentiment&&s.sentiment.isFear) gs+=3;
  if(s.volume&&s.volume.isHigh) gs+=3;
  if(s.atr&&s.atr.riskReward>=2) gs+=5;
  if(s.atr&&s.atr.riskReward>=1.5) gs+=3;
  if(s.atr&&s.atr.stopLossPct&&s.atr.stopLossPct<2) gs+=4;
  return gs;
}

function guvenPct(s) { return Math.min(Math.round(guvenSkoru(s)/80*100),99); }
function maxKazanc(s) { return s.atr&&s.atr.tp3Pct?s.atr.tp3Pct:(s.atr&&s.atr.tp1Pct?s.atr.tp1Pct:0); }
function sure(s) { const t=s.atr&&s.atr.tp1Pct?s.atr.tp1Pct:2; if(t>=5) return '2-4s'; if(t>=3) return '4-8s'; if(t>=2) return '8-24s'; return '1-3g'; }
function renk(skor) { if(skor>=8) return '#00FF88'; if(skor>=6) return '#39d353'; if(skor>=4) return '#3FB950'; return '#2ea84c'; }
function etiket(skor) { if(skor>=8) return 'MÜKEMMEL AL'; if(skor>=6) return 'ÇOK GÜÇLÜ AL'; if(skor>=4) return 'GÜÇLÜ AL'; if(skor>=2) return 'AL'; return 'ZAYIF AL'; }
function fmt(n) { if(!n&&n!==0) return '-'; return Number(n).toLocaleString('tr-TR',{maximumFractionDigits:6}); }

function sirala(liste) {
  const l=[...liste];
  if(aktifSiralama==='guven')  return l.sort((a,b)=>guvenPct(b)-guvenPct(a));
  if(aktifSiralama==='kazanc') return l.sort((a,b)=>maxKazanc(b)-maxKazanc(a));
  if(aktifSiralama==='skor')   return l.sort((a,b)=>b.score-a.score);
  if(aktifSiralama==='rr')     return l.sort((a,b)=>(b.atr&&b.atr.riskReward||0)-(a.atr&&a.atr.riskReward||0));
  return l;
}

function tabListe() {
  if(aktifTab==='kazanc') return sirala(sinyaller.filter(s=>maxKazanc(s)>=3));
  if(aktifTab==='guven')  return sirala(sinyaller.filter(s=>guvenPct(s)>=60));
  if(aktifTab==='balina') return sirala(sinyaller.filter(s=>s.whale&&s.whale.whaleBullish));
  return sirala(sinyaller);
}

function piyasaYorumu(s) {
  const y=[];
  if(s.rsi<30) y.push('RSI aşırı satım bölgesinde — güçlü geri dönüş sinyali.');
  if(s.trend&&s.trend.goldenCross) y.push('Golden Cross oluştu — uzun vadeli yükseliş başlangıcı olabilir.');
  if(s.mtfKonfirm) y.push('4 saatlik grafik de AL diyor — çok güçlü konfirmasyon.');
  if(s.volume&&s.volume.isHigh) y.push('Hacim '+s.volume.ratio+'x ortalamanın üzerinde — hareket güçlü.');
  if(s.fibonacci&&s.fibonacci.atSupport) y.push('Fibonacci destek seviyesinde — geri dönüş olasılığı yüksek.');
  if(s.whale&&s.whale.whaleBullish) y.push('Balina alımları tespit edildi — kurumsal ilgi var.');
  if(s.orderBook&&s.orderBook.bullish) y.push('Order book alım ağırlıklı — kısa vadede yükseliş baskısı.');
  if(s.funding&&s.funding.isVeryNegative) y.push('Funding rate negatif — short pozisyonlar sıkışmış.');
  if(s.sentiment&&s.sentiment.isExtremeFear) y.push('Korku endeksi çok düşük — tarihsel dip bölgesi.');
  if(s.isHighPotential) y.push('Yüksek potansiyel — TP3\'e kadar %'+maxKazanc(s)+' hedefleniyor.');
  if(y.length===0) y.push('Teknik göstergeler alım yönünde sinyal veriyor.');
  return y;
}

  return `<div class="rapor-wrap">
    <div class="r-baslik">Sistem Analiz Raporu</div>
    <div class="r-zaman">${document.getElementById('guncelleme').textContent}</div>
    <div class="r-ozet-grid">
      <div class="r-ozet-kart"><div class="r-ozet-ust"><span class="r-ozet-ad">Başarı Tahmini</span><span style="font-size:20px">🎯</span></div><div class="r-ozet-sayi" style="color:#00FF88">%${tahminiBasari}</div><div class="r-ozet-alt">Mevcut sinyallerde</div><div class="r-bar-bg"><div class="r-bar-dolu" style="width:${tahminiBasari}%;background:#00FF88"></div></div></div>
      <div class="r-ozet-kart"><div class="r-ozet-ust"><span class="r-ozet-ad">Hata Riski</span><span style="font-size:20px">⚠️</span></div><div class="r-ozet-sayi" style="color:#F85149">%${tahminiHata}</div><div class="r-ozet-alt">Ters gidebilir</div><div class="r-bar-bg"><div class="r-bar-dolu" style="width:${tahminiHata}%;background:#F85149"></div></div></div>
      <div class="r-ozet-kart"><div class="r-ozet-ust"><span class="r-ozet-ad">Ort. Güven</span><span style="font-size:20px">🛡️</span></div><div class="r-ozet-sayi" style="color:#58A6FF">%${ortGuven}</div><div class="r-ozet-alt">Tüm sinyaller</div><div class="r-bar-bg"><div class="r-bar-dolu" style="width:${ortGuven}%;background:#58A6FF"></div></div></div>
      <div class="r-ozet-kart"><div class="r-ozet-ust"><span class="r-ozet-ad">Ort. Max Kazanç</span><span style="font-size:20px">💰</span></div><div class="r-ozet-sayi" style="color:#FFD700">%${ortKazanc}</div><div class="r-ozet-alt">TP3 hedefi</div><div class="r-bar-bg"><div class="r-bar-dolu" style="width:${Math.min(ortKazanc*5,100)}%;background:#FFD700"></div></div></div>
    </div>
    <div class="r-ind-grid">
      <div class="r-ind-kart"><div class="r-ind-sayi">${toplam}</div><div class="r-ind-etiket">Toplam AL</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#00FF88">${guclu}</div><div class="r-ind-etiket">Güçlü AL</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#FFD700">${firsat}</div><div class="r-ind-etiket">Yük. Potansiyel</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#3FB950">${mtf}</div><div class="r-ind-etiket">MTF Onaylı</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#8B5CF6">${whale}</div><div class="r-ind-etiket">Whale Aktif</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#58A6FF">${yukGuven}</div><div class="r-ind-etiket">%70+ Güven</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#FF9500">${sinyaller.filter(s=>s.mtfKonfirm&&s.whale&&s.whale.whaleBullish).length}</div><div class="r-ind-etiket">MTF+Whale</div></div>
      <div class="r-ind-kart"><div class="r-ind-sayi" style="color:#F85149">${sinyaller.filter(s=>s.funding&&s.funding.isNegative).length}</div><div class="r-ind-etiket">FR Negatif</div></div>
    </div>
    <div class="r-bolum-baslik">En Güvenilir Fırsatlar</div>
    ${enIyi.length===0?'<div class="bos">Sinyal yok</div>':enIyi.map((s,i)=>{
      const sc=i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'#30363D';
      return `<div class="r-satir" onclick="modalAc(${s._idx})">
        <div class="r-satir-sol"><div class="r-sira" style="background:${sc}20;color:${sc};border:1px solid ${sc}">${i+1}</div><div><div class="r-coin">${s.symbol.replace('USDT','')}</div><div class="r-alt">${s.mtfKonfirm?'✓MTF ':''} ${s.whale&&s.whale.whaleBullish?'🐋 ':''} ${s.isHighPotential?'🔥':''}</div></div></div>
        <div class="r-sag"><div class="r-guven" style="color:${renk(s.score)}">%${guvenPct(s)} güven</div><div class="r-sure">${sure(s)}</div>${maxKazanc(s)>0?`<div class="r-hedef">Max +%${maxKazanc(s)}</div>`:''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ===================== RENDER =====================
function render() {
  const el=document.getElementById('icerik');
  const sb=document.getElementById('siralama-bar');
  if(aktifTab==='meme') {
    sb.style.display='none';
    el.innerHTML='<div class="yukleme"><div class="spinner"></div><div>Meme Radar taranıyor...</div></div>';
    fetch(BASE+'/api/meme/radar').then(r=>r.json()).then(d=>{el.innerHTML=memeRadarHTML(d);}).catch(()=>{el.innerHTML='<div class="bos">Bağlantı hatası</div>';});
    return;
  }
  if(aktifTab==='gumus') {
    sb.style.display='none';
    el.innerHTML='<div class="yukleme"><div class="spinner"></div><div>Gümüş verileri yükleniyor...</div></div>';
    fetch(BASE+'/api/silver').then(r=>r.json()).then(data=>{
      if(data.signal==='GUCLU_AL'&&oncekiSilverSignal!=='GUCLU_AL') {
        uyariGoster('🥈 Gümüş Güçlü AL Sinyali!','Gerçekleşme: %'+data.gerceklesme+' · Giriş: $'+(data.seviyeler&&data.seviyeler.alisZoneDusuk)+' – $'+(data.seviyeler&&data.seviyeler.alisZoneYuksek),'guclu');
      }
      oncekiSilverSignal=data.signal;
      el.innerHTML=gumusHTML(data);
    }).catch(()=>{el.innerHTML='<div class="bos">Bağlantı hatası</div>';});
    return;
  }
  if(aktifTab==='rapor') {
    sb.style.display='none';
    el.innerHTML=raporHTML();
    return;
  }
  sb.style.display='flex';
  const l=tabListe();
  if(l.length===0){el.innerHTML='<div class="bos">Bu kategori için sinyal yok</div>';return;}
  el.innerHTML=l.map(s=>kartHTML(s)).join('')+'<div style="height:40px"></div>';
}

function tabSec(t,btn) {
  aktifTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  render();
}

function siralamaySec(s,btn) {
  aktifSiralama=s;
  document.querySelectorAll('.siralama-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  render();
}

function modalAc(idx) {
  const s=sinyaller[idx];
  if(!s) return;
  document.getElementById('modal-icerik').innerHTML=modalHTML(s);
  document.getElementById('modal').classList.add('acik');
  document.getElementById('modal-icerik').scrollTop=0;
}

function modalKapat(e) {
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('acik');
}

function accToggle(id) {
  document.getElementById('acc-'+id).classList.toggle('acik');
  document.getElementById('ikon-'+id).classList.toggle('acik');
}

sinyalCek();
setInterval(sinyalCek,60000);
setInterval(anlikFiyatGuncelle,30000);
</script>
</body>
</html>
